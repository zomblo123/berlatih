        card2: '#1A1A28',

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --yt: #FF0000;
  --tkteal: #69C9D0;
  --tkpink: #EE1D52;
  --bg: #0A0A0F;
  --card: #12121A;
  --card2: #1A1A28;
  --border: #2A2A3E;
  --text: #F0F0FF;
  --text2: #9090B8;
  --text3: #5A5A80;
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  overflow-x: hidden;
}

/* ── NOISE TEXTURE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* ── AMBIENT GLOW BG ── */
.ambient-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.ambient-bg::before {
  content: '';
  position: absolute;
  top: -20%;
  left: -10%;
  width: 60%;
  height: 60%;
  background: radial-gradient(ellipse, rgba(238,29,82,0.07) 0%, transparent 70%);
  animation: driftA 8s ease-in-out infinite alternate;
}
.ambient-bg::after {
  content: '';
  position: absolute;
  bottom: -20%;
  right: -10%;
  width: 60%;
  height: 60%;
  background: radial-gradient(ellipse, rgba(105,201,208,0.07) 0%, transparent 70%);
  animation: driftB 9s ease-in-out infinite alternate;
}
@keyframes driftA { from { transform: translate(0,0) scale(1); } to { transform: translate(4%,6%) scale(1.1); } }
@keyframes driftB { from { transform: translate(0,0) scale(1); } to { transform: translate(-4%,-5%) scale(1.08); } }

/* ── PROGRESS BAR ── */
#progress-bar {
  position: fixed;
  top: 0; left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--yt), var(--tkpink), var(--tkteal));
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 100;
  box-shadow: 0 0 12px rgba(238,29,82,0.6);
}

/* ── TOP BAR ── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 90;
  background: linear-gradient(to bottom, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0) 100%);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text2);
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 20px;
  text-decoration: none;
  transition: all 0.2s;
}
.back-btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.2);
  color: white;
}

.series-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.5px;
}
.yt-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--yt); box-shadow: 0 0 8px var(--yt); }
.tk-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--tkteal); box-shadow: 0 0 8px var(--tkteal); }

.page-counter {
  margin-left: auto;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--text3);
  letter-spacing: 1px;
}

/* ── MAIN CONTENT AREA ── */
#content-area {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  padding: 72px 16px 100px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}

/* ── PAGE WRAPPER ── */
.page-wrapper {
  width: 100%;
  max-width: 680px;
  animation: slideUp 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(48px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── CARD ── */
.flip-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 28px;
  overflow: hidden;
  box-shadow:
    0 40px 80px rgba(0,0,0,0.6),
    0 0 0 1px rgba(255,255,255,0.03) inset;
}

/* ── COVER CARD ── */
.cover-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 28px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 40px 80px rgba(0,0,0,0.6);
}

/* ── ACCENT STRIP ── */
.accent-strip {
  height: 4px;
  width: 100%;
}

/* ── PAGE TAG ── */
.page-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 14px;
}

/* ── STEP ITEMS ── */
.step-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  margin-bottom: 8px;
  transition: all 0.2s;
}
.step-item:hover {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.1);
  transform: translateX(3px);
}
.step-num {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
  font-weight: 700;
}

/* ── INFO BOX ── */
.info-box {
  border-radius: 0 14px 14px 0;
  padding: 13px 16px;
  margin-top: 14px;
  font-size: 14px;
  font-weight: 600;
  line-height: 1.7;
  position: relative;
}

/* ── FACT CARD ── */
.fact-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

/* ── AYAH PANEL ── */
.ayah-panel {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(238,29,82,0.06);
  border: 1px solid rgba(238,29,82,0.15);
  border-radius: 16px;
  padding: 14px 16px;
  margin-top: 14px;
}
.ayah-av {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--tkpink), #a0002a);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  border: 2px solid rgba(238,29,82,0.4);
  box-shadow: 0 0 16px rgba(238,29,82,0.25);
}

/* ── SVG ICONS ── */
.icon-svg { flex-shrink: 0; }

/* ── NAV BAR ── */
.nav-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 90;
  padding: 12px 16px 20px;
  background: linear-gradient(to top, rgba(10,10,15,0.98) 60%, rgba(10,10,15,0) 100%);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.nav-inner {
  max-width: 680px;
  margin: 0 auto;
  display: flex;
  gap: 12px;
}

.nav-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border-radius: 18px;
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: 16px;
  padding: 16px 22px;
  cursor: pointer;
  border: none;
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  letter-spacing: 0.3px;
}
.nav-btn:active { transform: scale(0.96); }
.nav-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none !important; }

.btn-back {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text2);
}
.btn-back:hover:not(:disabled) {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.2);
  color: white;
}

.btn-next {
  flex: 2;
  background: linear-gradient(135deg, var(--tkpink), #a0002a);
  color: white;
  box-shadow: 0 8px 28px rgba(238,29,82,0.4), 0 2px 8px rgba(0,0,0,0.3);
}
.btn-next:hover:not(:disabled) {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 12px 36px rgba(238,29,82,0.55), 0 4px 12px rgba(0,0,0,0.3);
}

/* ── ROADMAP DOTS ── */
.roadmap-wrap {
  overflow-x: auto;
  padding: 0 4px 4px;
  scrollbar-width: none;
  margin-bottom: 14px;
}
.roadmap-wrap::-webkit-scrollbar { display: none; }
.roadmap {
  display: flex;
  align-items: center;
  gap: 4px;
  min-width: max-content;
  padding: 2px;
}
.rm-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
  transition: all 0.25s;
  cursor: pointer;
  flex-shrink: 0;
}
.rm-dot.done { background: rgba(238,29,82,0.5); }
.rm-dot.active {
  width: 24px;
  border-radius: 4px;
  background: var(--tkpink);
  box-shadow: 0 0 8px rgba(238,29,82,0.7);
}

/* ── COVER SPECIFIC ── */
.cover-hero {
  position: relative;
  padding: 48px 28px 36px;
  text-align: center;
  overflow: hidden;
}
.cover-hero::before {
  content: '';
  position: absolute;
  top: -40%;
  left: -20%;
  width: 140%;
  height: 140%;
  background:
    radial-gradient(ellipse at 30% 30%, rgba(255,0,0,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 70%, rgba(105,201,208,0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(238,29,82,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.cover-icons {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 28px;
  position: relative;
  z-index: 1;
}
.app-icon {
  width: 72px;
  height: 72px;
  border-radius: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1.5px solid rgba(255,255,255,0.12);
}
.yt-icon { background: linear-gradient(135deg, #FF0000, #CC0000); box-shadow: 0 8px 28px rgba(255,0,0,0.4); }
.tk-icon { background: linear-gradient(135deg, #010101, #1a1a1a); border: 1.5px solid rgba(105,201,208,0.3); box-shadow: 0 8px 28px rgba(105,201,208,0.25); }
.vs-text { font-size: 13px; font-weight: 800; color: var(--text3); letter-spacing: 2px; }

/* ── STREAMING ILLUS SVG ── */
.illus-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
  background: rgba(0,0,0,0.3);
  border-bottom: 1px solid var(--border);
}

/* ── BIG NUMBER ── */
.big-num {
  font-size: 64px;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -3px;
}

/* ── HIGHLIGHT WORD ── */
.hl-yt { color: var(--yt); }
.hl-tk { color: var(--tkteal); }
.hl-pk { color: var(--tkpink); }

/* ── GLOW TEXT ── */
.glow-yt { text-shadow: 0 0 24px rgba(255,0,0,0.5); }
.glow-tk { text-shadow: 0 0 24px rgba(105,201,208,0.5); }
.glow-pk { text-shadow: 0 0 24px rgba(238,29,82,0.5); }

/* ── DANGER BOX ── */
.danger-box {
  background: rgba(255,0,0,0.06);
  border: 1px solid rgba(255,0,0,0.15);
  border-left: 3px solid var(--yt);
  border-radius: 0 14px 14px 0;
  padding: 13px 16px;
  margin-top: 10px;
}

/* ── TIP BOX ── */
.tip-box {
  background: rgba(105,201,208,0.06);
  border: 1px solid rgba(105,201,208,0.15);
  border-left: 3px solid var(--tkteal);
  border-radius: 0 14px 14px 0;
  padding: 13px 16px;
}

/* ── GRADIENT BORDERS ── */
.gradient-border-yt {
  border-top: 3px solid;
  border-image: linear-gradient(90deg, var(--yt), var(--tkpink)) 1;
}
.gradient-border-tk {
  border-top: 3px solid;
  border-image: linear-gradient(90deg, var(--tkteal), var(--tkpink)) 1;
}

/* ── PLATFORM PILL ── */
.platform-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px 4px 8px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  margin-right: 6px;
  margin-bottom: 6px;
}
.pill-yt { background: rgba(255,0,0,0.12); border: 1px solid rgba(255,0,0,0.25); color: #FF6B6B; }
.pill-tk { background: rgba(105,201,208,0.1); border: 1px solid rgba(105,201,208,0.25); color: var(--tkteal); }

/* ── ENDING SPECIFIC ── */
.end-glow {
  text-shadow: 0 0 40px rgba(238,29,82,0.4), 0 0 80px rgba(105,201,208,0.2);
}

/* ── MOBILE TWEAKS ── */
@media (max-width: 400px) {
  .cover-hero { padding: 36px 18px 28px; }
  .app-icon { width: 58px; height: 58px; border-radius: 18px; }
  .big-num { font-size: 52px; }
}
</style>
</head>

const TOTAL = 12;
let cur = 1;

/* ── AUDIO ── */
let ctx = null;
function beep(f=600,d=55,v=0.07,type='sine'){
  try{
    if(!ctx) ctx = new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value=f; o.type=type;
    g.gain.setValueAtTime(v,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d/1000);
    o.start(); o.stop(ctx.currentTime+d/1000);
  }catch(e){}
}

/* ── SVG ICONS ── */
const ICONS = {

  brain:`<svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M18 8C14 8 11 11 11 14.5C11 16 11.5 17.5 12.5 18.5C11.5 19.5 11 21 11 22.5C11 26 14 29 18 29C22 29 25 26 25 22.5C25 21 24.5 19.5 23.5 18.5C24.5 17.5 25 16 25 14.5C25 11 22 8 18 8Z" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M18 14V22M15 17L21 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`,
  zap:`<svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M20 7L13 19H18L16 29L23 17H18L20 7Z" fill="currentColor" opacity=".8"/></svg>`,
  shield:`<svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M18 7L8 11V20C8 25.5 13 29.5 18 31C23 29.5 28 25.5 28 20V11L18 7Z" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M14 18L17 21L22 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  video:`<svg width="36" height="36" viewBox="0 0 36 36" fill="none"><rect x="4" y="10" width="22" height="16" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M26 15L32 12V24L26 21V15Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>`,
  code:`<svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M13 12L7 18L13 24M23 12L29 18L23 24M19 10L17 26" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  star:`<svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M18 7L21 14H29L23 19L25 27L18 22L11 27L13 19L7 14H15L18 7Z" fill="currentColor" opacity=".8"/></svg>`,
  alert:`<svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M18 8L30 28H6L18 8Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/><path d="M18 18V22M18 25V25.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,

        </div>
        <!-- Restart button -->
        <button onclick="reset()" style="width:100%;margin-top:14px;background:rgba(255,0,0,0.08);border:1px solid rgba(255,0,0,0.2);border-radius:14px;padding:14px;font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;color:#FF4040;cursor:pointer;transition:all 0.2s" onmouseover="this.style.background='rgba(255,0,0,0.14)'" onmouseout="this.style.background='rgba(255,0,0,0.08)'">
          ↺ Ulang dari Halaman 1
        </button>
      </div>
    </div>`;
  }

  else {
    // Regular content page
    html = `
    <div class="flip-card">
      <div class="accent-strip" style="background:${p.accent}"></div>
      ${p.illus ? `<div class="illus-wrap">${p.illus}</div>` : ''}
      <div style="padding:22px 20px 24px">
        <div class="page-tag" style="background:${p.tag.bg};color:${p.tag.color};border:1px solid ${p.tag.border}">
          ${p.tag.text}
        </div>
        <div style="font-family:'Outfit',sans-serif;font-size:clamp(18px,4.5vw,22px);font-weight:800;line-height:1.3;color:#F0F0FF;margin-bottom:12px">
          ${p.title}
        </div>
        <div style="font-size:15px;line-height:1.75;color:#9090B8;font-weight:500;margin-bottom:4px">
          ${p.body}
        </div>
        ${p.extra || ''}
      </div>
    </div>`;
  }

  card.innerHTML = html;
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';

  buildRoadmap();
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Update nav buttons
  document.getElementById('prevBtn').disabled = (cur === 1);
  const nb = document.getElementById('nextBtn');
  nb.disabled = (cur === TOTAL);
  if (cur === TOTAL) {
    nb.innerHTML = `✓ SELESAI`;
    nb.style.background = 'linear-gradient(135deg, #39FF14, #00A800)';
    nb.style.boxShadow = '0 8px 28px rgba(57,255,20,0.35)';
  } else {
    nb.innerHTML = `NEXT <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M8 4L14 10L8 16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    nb.style.background = 'linear-gradient(135deg, #EE1D52, #a0002a)';
    nb.style.boxShadow = '0 8px 28px rgba(238,29,82,0.4), 0 2px 8px rgba(0,0,0,0.3)';
  }
}

function buildRoadmap() {
  const rm = document.getElementById('roadmap');
  rm.innerHTML = '';
  for (let i = 1; i <= TOTAL; i++) {
    const d = document.createElement('div');
    let cls = 'rm-dot';
    if (i === cur) cls += ' active';
    else if (i < cur) cls += ' done';
    d.className = cls;
    d.onclick = () => { beep(800, 45, 0.05); cur = i; render(); };
    rm.appendChild(d);
  }
  const active = rm.querySelector('.rm-dot.active');
  if (active) active.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
}

function go(d) {
  const n = cur + d;
  if (n >= 1 && n <= TOTAL) {
    beep(d > 0 ? 700 : 500, 50, 0.07);
    cur = n;
    render();
  }
}
function reset() {
  beep(600, 60, 0.07);
  cur = 1;
  render();
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
});

// Swipe support
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  const dy = e.changedTouches[0].screenY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    dx < 0 ? go(1) : go(-1);
  }
}, { passive: true });

render();
</script>
</body>
</html>
