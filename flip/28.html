<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Coder Kecil — Flipbook Seri 28</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   TOKENS & RESET
══════════════════════════════════════ */
:root{
  --sky:   #00D4FF;
  --sky-d: #00A8CC;
  --sky-p: #E0F9FF;
  --purple:#A855F7;
  --purp-d:#8B46DB;
  --purp-p:#F3E8FF;
  --yellow:#FFD93D;
  --yel-d: #E6C200;
  --yel-p: #FFFBEB;
  --green: #10B981;
  --grn-d: #059669;
  --grn-p: #ECFDF5;
  --coral: #FF6B6B;
  --coral-d:#E85555;
  --coral-p:#FFF0F0;
  --bg:    #F7FAFE;
  --white: #FFFFFF;
  --ink:   #1A1A2E;
  --muted: #64748B;
  --border:#E2E8F0;
  --shadow:0 4px 24px rgba(0,0,0,.09);
  --shadow-lg:0 8px 40px rgba(0,0,0,.13);
  --r:20px;
  --r-sm:12px;
  --f-head:'Fredoka',sans-serif;
  --f-body:'Nunito',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;font-family:var(--f-body)}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 10% 0%,rgba(0,212,255,.12) 0%,transparent 55%),
    radial-gradient(ellipse at 90% 100%,rgba(168,85,247,.10) 0%,transparent 55%);
  color:var(--ink);
  padding:12px 12px 100px;
  overflow-x:hidden;
}

/* ══════════════════════════════════════
   FLOATING ORBS BACKGROUND
══════════════════════════════════════ */
.orbs{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.35;animation:drift 18s ease-in-out infinite alternate}
.orb1{width:400px;height:400px;background:var(--sky);top:-100px;left:-120px;animation-delay:0s}
.orb2{width:350px;height:350px;background:var(--purple);bottom:-80px;right:-100px;animation-delay:-6s}
.orb3{width:260px;height:260px;background:var(--yellow);bottom:20%;left:60%;animation-delay:-12s}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(30px,20px) scale(1.05)}}

/* ══════════════════════════════════════
   WRAPPER
══════════════════════════════════════ */
.wrapper{
  position:relative;z-index:1;
  max-width:720px;margin:0 auto;
}

/* ══════════════════════════════════════
   TOP BAR
══════════════════════════════════════ */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;margin-bottom:14px;flex-wrap:wrap;
}
.back-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--white);border:2px solid var(--border);
  color:var(--ink);font-family:var(--f-head);font-size:15px;font-weight:600;
  padding:8px 18px;border-radius:40px;text-decoration:none;
  box-shadow:0 2px 8px rgba(0,0,0,.08);transition:all .18s;
}
.back-btn:hover{background:var(--sky);color:#fff;border-color:var(--sky-d);transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,212,255,.3)}
.back-btn svg{width:16px;height:16px;flex-shrink:0}
.seri-badge{
  background:linear-gradient(135deg,var(--yellow),#FFB347);
  color:var(--ink);font-family:var(--f-head);font-size:13px;font-weight:600;
  padding:6px 16px;border-radius:40px;
  box-shadow:0 2px 8px rgba(255,217,61,.4);
}

/* ══════════════════════════════════════
   PROGRESS
══════════════════════════════════════ */
.prog-wrap{margin-bottom:14px}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.prog-bar{
  flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;
}
.prog-fill{
  height:100%;background:linear-gradient(90deg,var(--sky),var(--purple));
  border-radius:4px;transition:width .55s cubic-bezier(.34,1.56,.64,1);
}
.prog-label{font-family:var(--f-head);font-size:13px;color:var(--muted);white-space:nowrap}

/* Dot nav */
.dot-row{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--border);cursor:pointer;transition:all .18s;
}
.dot.active{background:var(--sky);transform:scale(1.4);box-shadow:0 0 0 3px rgba(0,212,255,.25)}
.dot.done{background:var(--purple)}

/* ══════════════════════════════════════
   PAGE CARD
══════════════════════════════════════ */
.page-card{
  background:var(--white);border-radius:var(--r);
  border:2px solid var(--border);
  box-shadow:var(--shadow-lg);
  overflow:hidden;
  min-height:420px;
  animation:pageIn .4s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes pageIn{
  from{opacity:0;transform:scale(.96) translateY(14px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

/* Accent strip */
.strip{height:8px;width:100%}

/* Two-col layout */
.two-col{
  display:grid;grid-template-columns:1fr;
}
@media(min-width:560px){
  .two-col{grid-template-columns:220px 1fr}
  .two-col .illus{border-right:2px solid var(--border)}
}
.illus{
  padding:28px 20px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:linear-gradient(145deg,#F0F9FF,#EEF2FF);
  min-height:180px;
}
.content{padding:26px 24px 22px}

/* ── Page meta ── */
.pg-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--sky-p);border:1.5px solid var(--sky);
  color:var(--sky-d);font-family:var(--f-head);font-size:12px;font-weight:600;
  padding:3px 12px;border-radius:20px;margin-bottom:10px;
}
.pg-title{
  font-family:var(--f-head);font-size:24px;font-weight:700;
  line-height:1.2;margin-bottom:12px;color:var(--ink);
}
.hl-sky{color:var(--sky-d)}
.hl-purple{color:var(--purp-d)}
.hl-yellow{color:#C18600}
.hl-coral{color:var(--coral-d)}
.hl-green{color:var(--grn-d)}
.pg-body{
  font-family:var(--f-body);font-size:14.5px;line-height:1.75;
  color:var(--muted);
}
.pg-body strong{color:var(--ink);font-weight:800}
.pg-body em{color:var(--purple);font-style:normal;font-weight:700}

/* ── Callout boxes ── */
.callout{
  border-radius:var(--r-sm);padding:13px 16px;margin-top:14px;
  font-family:var(--f-body);font-size:13.5px;font-weight:700;line-height:1.6;
}
.callout.sky{background:var(--sky-p);border-left:5px solid var(--sky);color:#004D61}
.callout.purple{background:var(--purp-p);border-left:5px solid var(--purple);color:#4A1880}
.callout.yellow{background:var(--yel-p);border-left:5px solid var(--yellow);color:#7A5800}
.callout.green{background:var(--grn-p);border-left:5px solid var(--green);color:#065F46}
.callout.coral{background:var(--coral-p);border-left:5px solid var(--coral);color:#7F1D1D}

/* ── Step list ── */
.step-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:9px 12px;border-radius:10px;
  background:var(--bg);border:1.5px solid var(--border);
  margin:6px 0;
  opacity:0;transform:translateX(-16px);
  animation:slideIn .35s ease forwards;
}
.step-item:nth-child(1){animation-delay:.05s}
.step-item:nth-child(2){animation-delay:.15s}
.step-item:nth-child(3){animation-delay:.25s}
.step-item:nth-child(4){animation-delay:.35s}
.step-item:nth-child(5){animation-delay:.45s}
@keyframes slideIn{to{opacity:1;transform:translateX(0)}}
.step-num{
  width:28px;height:28px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-head);font-size:13px;font-weight:700;color:#fff;
  background:linear-gradient(135deg,var(--sky),var(--purple));
}
.step-text{font-family:var(--f-body);font-size:13.5px;font-weight:700;color:var(--ink);padding-top:3px;line-height:1.45}

/* ── Pills ── */
.pill-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 14px;border-radius:20px;
  font-family:var(--f-head);font-size:13px;font-weight:600;
  border:1.5px solid transparent;
  cursor:default;transition:transform .15s;
  animation:popIn .3s ease both;
}
.pill:hover{transform:scale(1.05)}
.pill.sky{background:var(--sky-p);color:var(--sky-d);border-color:var(--sky)}
.pill.purple{background:var(--purp-p);color:var(--purp-d);border-color:var(--purple)}
.pill.yellow{background:var(--yel-p);color:#8B6900;border-color:var(--yellow)}
.pill.green{background:var(--grn-p);color:var(--grn-d);border-color:var(--green)}
.pill.coral{background:var(--coral-p);color:var(--coral-d);border-color:var(--coral)}
.pill:nth-child(1){animation-delay:.05s}
.pill:nth-child(2){animation-delay:.12s}
.pill:nth-child(3){animation-delay:.19s}
.pill:nth-child(4){animation-delay:.26s}
.pill:nth-child(5){animation-delay:.33s}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

/* ── Fact cards (interactive) ── */
.fact-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
@media(max-width:400px){.fact-grid{grid-template-columns:1fr}}
.fact-card{
  background:var(--bg);border:2px solid var(--border);
  border-radius:var(--r-sm);padding:14px 12px;text-align:center;
  cursor:pointer;transition:all .2s;
  font-family:var(--f-head);font-size:13px;font-weight:600;color:var(--ink);
  position:relative;overflow:hidden;
}
.fact-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12);border-color:var(--sky)}
.fact-card .emoji{font-size:28px;display:block;margin-bottom:6px}
.fact-card .detail{
  font-size:12px;color:var(--muted);font-family:var(--f-body);
  font-weight:600;line-height:1.4;
  max-height:0;overflow:hidden;transition:max-height .3s ease,opacity .3s;
  opacity:0;
}
.fact-card.open .detail{max-height:80px;opacity:1}
.fact-card.open{background:var(--sky-p);border-color:var(--sky)}
.tap-hint{font-size:10px;color:var(--muted);font-family:var(--f-body);margin-top:8px;text-align:center;opacity:.7}

/* ── Cover ── */
.cover-wrap{
  background:linear-gradient(145deg,#00C6FF 0%,#7B2FF7 100%);
  padding:36px 24px 28px;
  text-align:center;min-height:400px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.cover-wrap::before{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(circle at 25% 25%,rgba(255,255,255,.15) 0%,transparent 40%),
    radial-gradient(circle at 75% 75%,rgba(255,255,255,.08) 0%,transparent 40%);
}
.cover-title{
  font-family:var(--f-head);font-size:32px;font-weight:700;color:#fff;
  line-height:1.15;margin-bottom:6px;position:relative;
  text-shadow:0 2px 12px rgba(0,0,0,.2);
}
.cover-sub{
  font-family:var(--f-body);font-size:14px;
  color:rgba(255,255,255,.85);margin-bottom:14px;position:relative;
}
.cover-name{
  font-family:var(--f-head);font-size:20px;font-weight:700;
  color:#FFD93D;text-shadow:0 2px 8px rgba(0,0,0,.2);position:relative;
}
.cover-badge{
  display:inline-block;margin-top:10px;
  background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.35);
  color:#fff;font-family:var(--f-head);font-size:12px;padding:4px 16px;border-radius:20px;
  position:relative;
}

/* ── End card ── */
.end-hero{
  background:linear-gradient(135deg,var(--sky),var(--purple));
  border-radius:var(--r-sm);padding:22px 20px;text-align:center;margin:14px 0;
}
.end-hero h2{font-family:var(--f-head);font-size:22px;font-weight:700;color:#fff;margin-bottom:8px}
.end-hero p{font-family:var(--f-body);font-size:13.5px;color:rgba(255,255,255,.92);font-weight:700;line-height:1.65}
.next-box{
  background:var(--yel-p);border:2.5px solid var(--yellow);
  border-radius:var(--r-sm);padding:14px 16px;margin-top:12px;
}
.next-lbl{font-family:var(--f-head);font-size:11px;color:#8B6900;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.next-title{font-family:var(--f-head);font-size:15px;font-weight:700;color:#7A5800}
.ask-dad{
  background:linear-gradient(135deg,#FFF0F5,#FDE8FF);
  border:2.5px solid var(--coral);border-radius:var(--r-sm);
  padding:16px 18px;margin-top:12px;text-align:center;
}
.ask-dad h3{font-family:var(--f-head);font-size:18px;font-weight:700;color:var(--coral-d);margin-bottom:6px}
.ask-dad p{font-family:var(--f-body);font-size:13px;font-weight:700;color:#7F1D1D;line-height:1.6}

/* ── Coding animation block ── */
.code-term{
  background:#1A1A2E;border-radius:var(--r-sm);
  padding:14px 16px;margin-top:12px;
  font-family:'Courier New',monospace;font-size:12.5px;line-height:1.9;
}
.code-line{
  opacity:0;transform:translateY(-6px);
  animation:codeAppear .3s ease forwards;
  white-space:pre;
}
.code-line:nth-child(1){animation-delay:.1s}
.code-line:nth-child(2){animation-delay:.25s}
.code-line:nth-child(3){animation-delay:.4s}
.code-line:nth-child(4){animation-delay:.55s}
.code-line:nth-child(5){animation-delay:.7s}
@keyframes codeAppear{to{opacity:1;transform:translateY(0)}}
.c-kw{color:#C678DD}.c-fn{color:#61AFEF}.c-str{color:#98C379}.c-num{color:#E5C07B}.c-cmt{color:#5C6370;font-style:italic}

/* ── Nav buttons ── */
.nav-bar{
  display:flex;gap:10px;margin-top:18px;align-items:center;
}
.nav-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--f-head);font-weight:600;font-size:15px;
  padding:13px 20px;border-radius:40px;cursor:pointer;border:none;
  transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent;
}
.nav-btn:active:not(:disabled){transform:scale(.96)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.btn-prev{
  background:var(--white);border:2.5px solid var(--border);color:var(--ink);
  box-shadow:0 2px 8px rgba(0,0,0,.07);
}
.btn-prev:hover:not(:disabled){background:#F1F5F9;border-color:var(--muted)}
.btn-next{
  background:linear-gradient(135deg,var(--sky),var(--purple));
  color:#fff;flex:1.6;
  box-shadow:0 4px 18px rgba(0,212,255,.35);
}
.btn-next:hover:not(:disabled){filter:brightness(1.08);box-shadow:0 6px 26px rgba(0,212,255,.45);transform:translateY(-2px)}

/* ── Responsive ── */
@media(max-width:400px){
  .cover-title{font-size:26px}
  .pg-title{font-size:20px}
  .nav-btn{font-size:13px;padding:11px 14px}
}
</style>
</head>

/* ════════════════════════════════════
   STATE & RENDER
════════════════════════════════════ */
let cur = 1;
const TOTAL = P.length;

function buildDots(){
  const c = document.getElementById('dotRow');
  c.innerHTML = '';
  for(let i=1;i<=TOTAL;i++){
    const d = document.createElement('span');
    d.className = 'dot'+(i===cur?' active':i<cur?' done':'');
    d.onclick = ()=>goTo(i);
    c.appendChild(d);
  }
}

function render(){
  const page = P[cur-1];
  const card = document.getElementById('pageCard');

  // trigger animation reset
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'pageIn .4s cubic-bezier(.34,1.56,.64,1) both';

  let inner = `<div class="strip" style="${page.s}"></div>`;

  if(page.illus){
    inner += `<div class="two-col">
      <div class="illus">${page.illus}</div>
      <div class="content">${page.html}</div>
    </div>`;
  } else {
    inner += page.html;
  }
  card.innerHTML = inner;

  // progress
  document.getElementById('progFill').style.width = (cur/TOTAL*100)+'%';
  document.getElementById('progLabel').textContent = `${cur} / ${TOTAL}`;

  // buttons
  document.getElementById('btnPrev').disabled = cur === 1;
  const nb = document.getElementById('btnNext');
  nb.disabled = cur === TOTAL;
  nb.innerHTML = cur === TOTAL
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Selesai! 🎉`
    : `Selanjutnya <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`;

  buildDots();
  window.scrollTo({top:0, behavior:'smooth'});
}

function go(d){
  const n = cur + d;
  if(n >= 1 && n <= TOTAL){ cur = n; render(); }
}
function goTo(n){ if(n !== cur){ cur = n; render(); } }

render();
</script>
