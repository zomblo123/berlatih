<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urut-urutan Itu Penting! — Flipbook Seri 8</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Nunito:wght@400;700;800;900&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --logic-blue:#1A6CF6;
  --logic-blue-dark:#0F4DB8;
  --logic-blue-pale:#E8F0FF;
  --logic-blue-mid:#C0D4FF;
  --step-green:#16A34A;
  --step-green-dark:#0F7035;
  --step-green-pale:#E6F7EE;
  --step-green-mid:#A3DBBE;
  --block-yellow:#F59E0B;
  --block-yellow-pale:#FEF3C7;
  --block-red:#EF4444;
  --block-red-pale:#FEE2E2;
  --bg:#F0F4FF;
  --bg-dark:#0D1B2A;
  --surface:#FFFFFF;
  --surface-dark:#132035;
  --text:#0D1B2A;
  --text-muted:#4B5563;
  --border:#CBD5E1;
  --mono:'JetBrains Mono',monospace;
  --sans:'Sora',sans-serif;
  --body:'Nunito',sans-serif;
  --block-shadow:3px 4px 0px rgba(0,0,0,0.18);
  --block-shadow-active:1px 2px 0px rgba(0,0,0,0.18);
}

body{
  font-family:var(--body);
  background:var(--bg);
  min-height:100vh;
  padding:16px;
  color:var(--text);
}

/* Grid background pattern */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(26,108,246,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(26,108,246,0.05) 1px,transparent 1px);
  background-size:32px 32px;
  pointer-events:none;
  z-index:0;
}

.wrapper{
  position:relative;
  z-index:1;
  max-width:780px;
  margin:0 auto;
}

/* ── TOP BAR ── */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
  gap:10px;
  flex-wrap:wrap;
}
.brand-pill{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--logic-blue);
  color:#fff;
  font-family:var(--sans);
  font-weight:700;
  font-size:13px;
  padding:6px 14px;
  border-radius:6px;
  box-shadow:var(--block-shadow);
  border-bottom:3px solid var(--logic-blue-dark);
}
.back-lib-btn{
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--surface);
  border:2px solid var(--border);
  border-bottom:3px solid var(--border);
  color:var(--text);
  font-family:var(--sans);
  font-weight:700;
  font-size:13px;
  padding:6px 14px;
  border-radius:6px;
  cursor:pointer;
  text-decoration:none;
  transition:all .12s;
  box-shadow:var(--block-shadow);
}
.back-lib-btn:hover{
  background:var(--logic-blue-pale);
  border-color:var(--logic-blue);
  color:var(--logic-blue);
  transform:translateY(-2px);
}
.back-lib-btn:active{
  transform:translateY(1px);
  box-shadow:var(--block-shadow-active);
  border-bottom-width:2px;
}
.series-badge{
  background:var(--block-yellow-pale);
  border:2px solid var(--block-yellow);
  color:#92400E;
  font-family:var(--mono);
  font-size:11px;
  font-weight:600;
  padding:4px 12px;
  border-radius:4px;
}

/* ── ROADMAP NAV ── */
.roadmap-wrap{
  margin-bottom:16px;
  overflow-x:auto;
  padding-bottom:6px;
}
.roadmap{
  display:flex;
  align-items:center;
  gap:0;
  min-width:max-content;
  padding:4px 2px;
}
.rm-node{
  width:32px;height:32px;
  border-radius:6px;
  background:var(--surface);
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);
  font-size:11px;
  font-weight:700;
  color:var(--text-muted);
  cursor:pointer;
  transition:all .15s;
  flex-shrink:0;
  box-shadow:var(--block-shadow);
  border-bottom-width:3px;
}
.rm-node:hover{background:var(--logic-blue-pale);border-color:var(--logic-blue);color:var(--logic-blue)}
.rm-node.active{background:var(--logic-blue);border-color:var(--logic-blue-dark);color:#fff;transform:translateY(-2px);box-shadow:var(--block-shadow)}
.rm-node.done{background:var(--step-green-pale);border-color:var(--step-green);color:var(--step-green)}
.rm-connector{
  width:20px;height:4px;
  background:var(--border);
  flex-shrink:0;
  position:relative;
}
.rm-connector.done{background:var(--step-green)}
.rm-connector::after{
  content:'';
  position:absolute;
  right:-4px;top:-2px;
  border:4px solid transparent;
  border-left-color:var(--border);
}
.rm-connector.done::after{border-left-color:var(--step-green)}

/* ── PAGE CARD ── */
.page-card{
  background:var(--surface);
  border-radius:12px;
  border:2px solid var(--border);
  border-bottom:5px solid var(--border);
  overflow:hidden;
  min-height:460px;
  box-shadow:4px 6px 0px rgba(0,0,0,0.1);
}

/* Page color strip */
.page-strip{
  height:8px;
}

/* ── TWO COLUMN LAYOUT ── */
.page-layout{
  display:grid;
  grid-template-columns:1fr;
  gap:0;
}
@media(min-width:600px){
  .page-layout{
    grid-template-columns:1fr 1fr;
  }
  .page-layout .illus-col{
    border-right:2px solid var(--border);
  }
}

.illus-col{
  padding:28px 24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:var(--bg);
  min-height:220px;
}
.text-col{
  padding:28px 26px 24px;
}

/* Cover layout override */
.cover-layout{
  grid-template-columns:1fr!important;
  text-align:center;
}
.cover-layout .illus-col{
  border-right:none!important;
  background:linear-gradient(160deg,#0F4DB8 0%,#1A6CF6 50%,#2D85FF 100%);
  padding:40px 24px 32px;
}

/* ── PAGE META ── */
.page-tag{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:var(--logic-blue-pale);
  border:1.5px solid var(--logic-blue-mid);
  color:var(--logic-blue-dark);
  font-family:var(--mono);
  font-size:11px;
  font-weight:600;
  padding:3px 10px;
  border-radius:4px;
  margin-bottom:12px;
}
.page-title{
  font-family:var(--sans);
  font-size:22px;
  font-weight:800;
  color:var(--text);
  line-height:1.25;
  margin-bottom:14px;
}
.page-title .accent{color:var(--logic-blue)}
.page-body{
  font-family:var(--body);
  font-size:14.5px;
  line-height:1.75;
  color:var(--text-muted);
}
.page-body strong{color:var(--text);font-weight:800}
.page-body em{color:var(--logic-blue);font-style:normal;font-weight:700}

/* ── BLOCK ELEMENTS (LEGO style) ── */
.code-block{
  background:#0D1B2A;
  border-radius:8px;
  border:2px solid #1E3A5F;
  border-bottom:4px solid #0A1220;
  padding:14px 16px;
  margin-top:14px;
  font-family:var(--mono);
  font-size:12.5px;
  line-height:1.8;
}
.code-line{
  display:flex;
  align-items:center;
  gap:10px;
  opacity:0;
  transform:translateY(-12px);
  animation:slideDown .3s ease forwards;
}
.code-line.step-num{
  color:#94A3B8;
  font-size:11px;
  min-width:20px;
}
.code-line .kw{color:#60A5FA}
.code-line .fn{color:#34D399}
.code-line .str{color:#FCD34D}
.code-line .cmt{color:#4B5563;font-style:italic}
.code-line .op{color:#F472B6}

@keyframes slideDown{
  to{opacity:1;transform:translateY(0)}
}

.lego-block{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--logic-blue);
  color:#fff;
  font-family:var(--mono);
  font-size:12px;
  font-weight:600;
  padding:8px 14px;
  border-radius:6px;
  border-bottom:3px solid var(--logic-blue-dark);
  margin:6px 0;
  position:relative;
  box-shadow:var(--block-shadow);
  opacity:0;
  transform:translateY(-10px);
  animation:slideDown .3s ease forwards;
}
.lego-block.green{background:var(--step-green);border-bottom-color:var(--step-green-dark)}
.lego-block.amber{background:var(--block-yellow);border-bottom-color:#D97706;color:#1A1A1A}
.lego-block.red{background:var(--block-red);border-bottom-color:#B91C1C}
.lego-block::before{
  content:'';
  position:absolute;
  left:-4px;top:50%;transform:translateY(-50%);
  width:8px;height:14px;
  background:inherit;
  border-radius:3px 0 0 3px;
  opacity:.7;
}

.fun-box{
  background:var(--step-green-pale);
  border:2px solid var(--step-green-mid);
  border-left:5px solid var(--step-green);
  border-radius:0 8px 8px 0;
  padding:12px 14px;
  margin-top:14px;
  font-size:13px;
  font-weight:700;
  color:#065F46;
  line-height:1.6;
}
.warn-box{
  background:var(--block-red-pale);
  border:2px solid #FCA5A5;
  border-left:5px solid var(--block-red);
  border-radius:0 8px 8px 0;
  padding:12px 14px;
  margin-top:14px;
  font-size:13px;
  font-weight:700;
  color:#991B1B;
  line-height:1.6;
}

/* ── ILLUSTRATIONS SVG ── */
.illus-svg{
  width:100%;
  max-width:260px;
  height:auto;
}

/* ── NAV BUTTONS ── */
.nav-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:16px;
  gap:10px;
}
.nav-btn{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--surface);
  border:2px solid var(--border);
  border-bottom:4px solid var(--border);
  color:var(--text);
  font-family:var(--sans);
  font-weight:700;
  font-size:14px;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
  transition:all .12s;
  flex:1;
  justify-content:center;
  box-shadow:var(--block-shadow);
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.nav-btn:hover:not(:disabled){
  background:var(--logic-blue-pale);
  border-color:var(--logic-blue);
  color:var(--logic-blue);
  transform:translateY(-2px);
}
.nav-btn:active:not(:disabled){
  transform:translateY(1px);
  box-shadow:var(--block-shadow-active);
  border-bottom-width:2px;
}
.nav-btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.nav-btn.primary{
  background:var(--logic-blue);
  border-color:var(--logic-blue-dark);
  color:#fff;
  flex:1.6;
}
.nav-btn.primary:hover:not(:disabled){
  background:var(--logic-blue-dark);
  border-color:#0A3C9A;
  color:#fff;
}
.nav-btn.reset{
  background:var(--block-yellow-pale);
  border-color:var(--block-yellow);
  color:#78350F;
}
.nav-btn.reset:hover{
  background:#FEF3C7;
  border-color:#D97706;
}

/* ── PROGRESS ── */
.progress-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}
.progress-bar{
  flex:1;
  height:6px;
  background:var(--border);
  border-radius:3px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--logic-blue),var(--step-green));
  border-radius:3px;
  transition:width .4s ease;
}
.progress-label{
  font-family:var(--mono);
  font-size:11px;
  color:var(--text-muted);
  white-space:nowrap;
}

/* ── COVER STYLES ── */
.cover-title{
  font-family:var(--sans);
  font-size:28px;
  font-weight:800;
  color:#fff;
  line-height:1.2;
  margin-bottom:8px;
}
.cover-sub{
  font-family:var(--body);
  font-size:15px;
  color:rgba(255,255,255,0.8);
  margin-bottom:14px;
}
.cover-name{
  font-family:var(--sans);
  font-size:20px;
  font-weight:800;
  color:#FFD700;
  margin-bottom:6px;
}
.cover-badge{
  display:inline-block;
  background:rgba(255,255,255,0.15);
  border:2px solid rgba(255,255,255,0.3);
  color:#fff;
  font-family:var(--mono);
  font-size:12px;
  padding:4px 14px;
  border-radius:6px;
}

/* ── SEQUENCE STEPPER ── */
.seq-step{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:10px 12px;
  background:var(--bg);
  border-radius:8px;
  border:1.5px solid var(--border);
  margin:6px 0;
  opacity:0;
  transform:translateY(-10px);
  animation:slideDown .35s ease forwards;
}
.seq-num{
  width:26px;height:26px;
  border-radius:5px;
  background:var(--logic-blue);
  color:#fff;
  font-family:var(--mono);
  font-size:12px;
  font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  border-bottom:2.5px solid var(--logic-blue-dark);
}
.seq-text{
  font-family:var(--body);
  font-size:13.5px;
  font-weight:700;
  color:var(--text);
  line-height:1.5;
  padding-top:2px;
}

/* ── COMPARE TABLE ── */
.compare-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 10px;
  border-radius:6px;
  margin:5px 0;
  font-family:var(--body);
  font-size:13px;
  font-weight:700;
  opacity:0;
  transform:translateY(-8px);
  animation:slideDown .3s ease forwards;
}
.compare-row.correct{background:var(--step-green-pale);color:#065F46}
.compare-row.wrong{background:var(--block-red-pale);color:#991B1B}
.cmp-icon{font-size:16px;flex-shrink:0}

/* ── END PAGE ── */
.end-card{
  background:linear-gradient(135deg,var(--logic-blue),var(--logic-blue-dark));
  border-radius:10px;
  padding:20px;
  text-align:center;
  margin:14px 0;
  border:2px solid var(--logic-blue-dark);
  border-bottom:5px solid #0A3C9A;
}
.end-title{
  font-family:var(--sans);
  font-size:20px;
  font-weight:800;
  color:#fff;
  margin-bottom:8px;
}
.end-text{
  font-size:13px;
  color:rgba(255,255,255,.9);
  font-weight:700;
  line-height:1.65;
}
.next-book{
  background:var(--step-green-pale);
  border:2px solid var(--step-green-mid);
  border-left:5px solid var(--step-green);
  border-radius:0 10px 10px 0;
  padding:14px 16px;
  margin-top:12px;
}
.next-label{
  font-family:var(--mono);
  font-size:11px;
  color:var(--step-green-dark);
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:4px;
}
.next-title{
  font-family:var(--sans);
  font-weight:700;
  font-size:14px;
  color:var(--step-green-dark);
}

/* ── ROBOT ILLUSTRATION HELPERS ── */
.robot-wrap{font-size:14px}

/* ── STAGGER DELAYS ── */
.code-line:nth-child(1),.lego-block:nth-child(1),.seq-step:nth-child(1),.compare-row:nth-child(1){animation-delay:.05s}
.code-line:nth-child(2),.lego-block:nth-child(2),.seq-step:nth-child(2),.compare-row:nth-child(2){animation-delay:.18s}
.code-line:nth-child(3),.lego-block:nth-child(3),.seq-step:nth-child(3),.compare-row:nth-child(3){animation-delay:.31s}
.code-line:nth-child(4),.lego-block:nth-child(4),.seq-step:nth-child(4),.compare-row:nth-child(4){animation-delay:.44s}
.code-line:nth-child(5),.lego-block:nth-child(5),.seq-step:nth-child(5),.compare-row:nth-child(5){animation-delay:.57s}
.code-line:nth-child(6),.lego-block:nth-child(6),.seq-step:nth-child(6){animation-delay:.70s}

@media(max-width:420px){
  .cover-title{font-size:22px}
  .page-title{font-size:18px}
  .nav-btn{font-size:13px;padding:9px 14px}
}
</style>
</head>
<body>
<div class="wrapper">

  <!-- TOP BAR -->
  <div class="topbar">
    <a class="back-lib-btn" href="..\/perpustakaan.html">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Perpustakaan
    </a>
    <div class="brand-pill">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="rgba(255,255,255,.7)" stroke-width="1.5"/><rect x="3.5" y="3.5" width="3" height="3" rx=".5" fill="rgba(255,255,255,.8)"/><rect x="7.5" y="3.5" width="3" height="3" rx=".5" fill="rgba(255,255,255,.8)"/><rect x="3.5" y="7.5" width="3" height="3" rx=".5" fill="rgba(255,255,255,.8)"/><rect x="7.5" y="7.5" width="3" height="3" rx=".5" fill="rgba(255,255,255,.8)"/></svg>
      Flipbook Edukasi
    </div>
    <div class="series-badge">SERI #08</div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:7.7%"></div></div>
    <div class="progress-label" id="progressLabel">01 / 13</div>
  </div>

  <!-- ROADMAP NAV -->
  <div class="roadmap-wrap">
    <div class="roadmap" id="roadmap"></div>
  </div>

  <!-- PAGE CONTAINER -->
  <div class="page-card" id="pageCard">
    <div id="pageContent"></div>
  </div>

  <!-- NAV BUTTONS -->
  <div class="nav-bar">
    <button class="nav-btn" id="prevBtn" onclick="go(-1)">← Sebelumnya</button>
    <button class="nav-btn primary" id="nextBtn" onclick="go(1)">Selanjutnya →</button>
  </div>

</div>

<script>
const TOTAL = 13;
let cur = 1;

/* ── PAGE DATA ── */
const pages = [
  /* 1 COVER */
  {
    strip:'background:linear-gradient(90deg,#1A6CF6,#16A34A)',
    layout:'cover',
    illus: `<svg class="illus-svg" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Robot body -->
      <rect x="80" y="110" width="80" height="70" rx="8" fill="#C0D4FF" stroke="#1A6CF6" stroke-width="2.5"/>

      <!-- Robot screen lines -->
      <rect x="95" y="127" width="20" height="5" rx="2" fill="#1A6CF6" opacity=".6"/>
      <rect x="95" y="137" width="30" height="5" rx="2" fill="#16A34A" opacity=".7"/>
      <rect x="95" y="147" width="15" height="5" rx="2" fill="#F59E0B" opacity=".8"/>
      <!-- Lights -->
      <circle cx="136" cy="129" r="4" fill="#34D399"/>
      <circle cx="148" cy="129" r="4" fill="#F87171" opacity=".8"/>
      <!-- Robot head -->
      <rect x="90" y="72" width="60" height="44" rx="10" fill="#C0D4FF" stroke="#1A6CF6" stroke-width="2.5"/>
      <rect x="100" y="82" width="18" height="12" rx="4" fill="#1A6CF6"/>
      <rect x="122" y="82" width="18" height="12" rx="4" fill="#1A6CF6"/>
      <circle cx="109" cy="88" r="4" fill="#60A5FA"/>
      <circle cx="131" cy="88" r="4" fill="#60A5FA"/>
      <rect x="105" y="100" width="30" height="6" rx="3" fill="#A0B8F0"/>
      <!-- Antenna -->
      <rect x="118" y="58" width="4" height="16" rx="2" fill="#1A6CF6"/>
      <circle cx="120" cy="55" r="6" fill="#F59E0B" stroke="#D97706" stroke-width="1.5"/>
      <!-- Arms -->
      <rect x="48" y="118" width="34" height="12" rx="6" fill="#A0B8F0" stroke="#1A6CF6" stroke-width="1.5"/>
      <rect x="158" y="118" width="34" height="12" rx="6" fill="#A0B8F0" stroke="#1A6CF6" stroke-width="1.5"/>
      <!-- Legs -->
      <rect x="95" y="180" width="18" height="16" rx="4" fill="#A0B8F0" stroke="#1A6CF6" stroke-width="1.5"/>
      <rect x="127" y="180" width="18" height="16" rx="4" fill="#A0B8F0" stroke="#1A6CF6" stroke-width="1.5"/>
      <!-- Aslan (captain) -->
      <circle cx="170" cy="90" r="24" fill="#FFCC80"/>

/* ── ROADMAP ── */
function buildRoadmap(){
  const rm = document.getElementById('roadmap');
  rm.innerHTML='';
  for(let i=1;i<=TOTAL;i++){
    const n=document.createElement('div');
    n.className='rm-node'+(i===cur?' active':i<cur?' done':'');
    n.textContent=String(i).padStart(2,'0');
    n.onclick=()=>goTo(i);
    rm.appendChild(n);
    if(i<TOTAL){
      const c=document.createElement('div');
      c.className='rm-connector'+(i<cur?' done':'');
      rm.appendChild(c);
    }
  }
  /* scroll active into view */
  const active=rm.querySelector('.active');
  if(active)active.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
}

/* ── RENDER ── */
function render(){
  const p=pages[cur-1];
  const card=document.getElementById('pageCard');

  /* strip */
  let html=`<div class="page-strip" style="${p.strip}"></div>`;

  if(p.layout==='cover'){
    html+=p.html;
    /* inject illus into cover illus-col */
  } else {
    html+=`<div class="page-layout">
      <div class="illus-col">${p.illus||''}</div>
      <div class="text-col">${p.html}</div>
    </div>`;
  }

  /* For cover, we want illus inside the blue column - handled via cover html */
  if(p.layout==='cover'){
    card.innerHTML=`<div class="page-strip" style="${p.strip}"></div>
    <div class="page-layout cover-layout">
      <div class="illus-col">
        <div class="cover-title">Urut-urutan<br>Itu Penting!</div>
        <div class="cover-sub">Petualangan Perintah Coding</div>
        ${p.illus||''}
        <div class="cover-name">✨ Aslan ✨</div>
        <div class="cover-badge">FLIPBOOK EDUKASI · SERI 8</div>
      </div>
    </div>`;
  } else {
    card.innerHTML=html;
  }

  /* progress */
  document.getElementById('progressFill').style.width=(cur/TOTAL*100)+'%';
  document.getElementById('progressLabel').textContent=String(cur).padStart(2,'0')+' / '+String(TOTAL).padStart(2,'0');

  /* nav */
  document.getElementById('prevBtn').disabled=cur===1;
  document.getElementById('nextBtn').disabled=cur===TOTAL;
  document.getElementById('nextBtn').textContent=cur===TOTAL?'🎉 Selesai!':'Selanjutnya →';

  buildRoadmap();

  /* scroll to top */
  window.scrollTo({top:0,behavior:'smooth'});
}

function go(d){
  const n=cur+d;
  if(n>=1&&n<=TOTAL){cur=n;render();}
}
function goTo(n){cur=n;render();}
function reset(){cur=1;render();}

render();
</script>
