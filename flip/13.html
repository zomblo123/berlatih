<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algoritma: Resep Masak Paling Keren — Flipbook Seri 13</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --butter:#F5C842;
  --butter-dark:#D4A017;
  --butter-pale:#FFFBEA;
  --butter-mid:#FDE89A;
  --tomato:#E63B2E;
  --tomato-dark:#B52820;
  --tomato-pale:#FFF0EE;
  --tomato-mid:#F9A89F;
  --cream:#FFF8F0;
  --green:#2A9D5C;
  --green-dark:#1E7042;
  --green-pale:#E8F7EE;
  --green-mid:#85D9AA;
  --brown:#7C4A1E;
  --brown-light:#C68642;
  --blue:#2563EB;
  --bg:#FFFBEA;
  --surface:#FFFFFF;
  --text:#2C1A0E;
  --text-muted:#7C4A1E;
  --border:#FDE89A;
  --border-dark:#F5C842;
  --mono:'JetBrains Mono',monospace;
  --script:'Dancing Script',cursive;
  --body:'Nunito',sans-serif;
  --shadow:4px 5px 0px rgba(245,200,66,0.25);
  --shadow-active:1px 2px 0px rgba(245,200,66,0.25);
}

body{
  font-family:var(--body);
  background:var(--bg);
  min-height:100vh;
  padding:16px;
  color:var(--text);
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(245,200,66,0.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(245,200,66,0.07) 1px,transparent 1px),
    radial-gradient(circle at 10% 15%,rgba(230,59,46,0.06) 0%,transparent 50%),
    radial-gradient(circle at 90% 85%,rgba(245,200,66,0.08) 0%,transparent 50%);
  background-size:30px 30px,30px 30px,100% 100%,100% 100%;
  pointer-events:none;
  z-index:0;
}

.bg-deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-deco span{
  position:absolute;font-size:28px;opacity:.06;
  animation:floatDeco linear infinite;
}
.bg-deco span:nth-child(1){left:5%;top:10%;animation-duration:20s}
.bg-deco span:nth-child(2){left:88%;top:20%;animation-duration:25s;animation-delay:-5s}
.bg-deco span:nth-child(3){left:20%;top:80%;animation-duration:18s;animation-delay:-8s}
.bg-deco span:nth-child(4){left:75%;top:70%;animation-duration:22s;animation-delay:-3s}
.bg-deco span:nth-child(5){left:50%;top:5%;animation-duration:30s;animation-delay:-12s}
@keyframes floatDeco{
  0%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-30px) rotate(180deg)}
  100%{transform:translateY(0) rotate(360deg)}
}

.wrapper{position:relative;z-index:1;max-width:800px;margin:0 auto}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;gap:10px;flex-wrap:wrap;
}
.brand-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--tomato);color:#fff;
  font-family:var(--body);font-weight:800;font-size:13px;
  padding:7px 16px;border-radius:8px;
  box-shadow:0 3px 0 var(--tomato-dark);
  border-bottom:3px solid var(--tomato-dark);
}
.back-btn{
  display:flex;align-items:center;gap:7px;
  background:var(--surface);border:2px solid var(--border);
  border-bottom:3px solid var(--border-dark);color:var(--text);
  font-family:var(--body);font-weight:800;font-size:13px;
  padding:7px 16px;border-radius:8px;cursor:pointer;
  text-decoration:none;transition:all .12s;box-shadow:var(--shadow);
}
.back-btn:hover{background:var(--butter-pale);border-color:var(--butter-dark);color:var(--brown);transform:translateY(-2px)}
.back-btn:active{transform:translateY(1px);box-shadow:var(--shadow-active);border-bottom-width:2px}
.series-badge{
  background:var(--butter-pale);border:2px solid var(--butter-mid);
  color:var(--brown);font-family:var(--mono);font-size:11px;font-weight:700;
  padding:4px 12px;border-radius:6px;
}

/* ── PROGRESS ── */
.progress-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.circ-wrap{position:relative;width:54px;height:54px;flex-shrink:0}
.circ-wrap svg{transform:rotate(-90deg)}
.c-track{stroke:var(--border);fill:none;stroke-width:4}
.c-fill{fill:none;stroke-width:4;stroke:var(--tomato);stroke-linecap:round;transition:stroke-dashoffset .5s ease;stroke-dasharray:138.16}
.c-lbl{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:10px;font-weight:700;color:var(--tomato-dark);
}
.prog-text{font-family:var(--body);font-size:13px;font-weight:800;color:var(--text-muted)}
.prog-text span{color:var(--tomato);font-weight:900}

/* ── CHECKLIST NAV ── */
.checklist-wrap{margin-bottom:16px;overflow-x:auto;padding-bottom:6px}
.checklist{display:flex;align-items:center;gap:0;min-width:max-content;padding:4px 2px}
.cl-node{
  width:34px;height:34px;border-radius:50%;
  background:var(--surface);border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:10px;font-weight:700;
  color:var(--text-muted);cursor:pointer;transition:all .15s;flex-shrink:0;
  box-shadow:0 2px 0 var(--border-dark);
}
.cl-node:hover{background:var(--butter-pale);border-color:var(--butter-dark);color:var(--brown)}
.cl-node.active{
  background:var(--tomato);border-color:var(--tomato-dark);color:#fff;
  transform:translateY(-2px);box-shadow:0 3px 0 var(--tomato-dark);
  animation:pulseNode 1.5s ease infinite;
}
.cl-node.done{background:var(--green-pale);border-color:var(--green);color:var(--green);font-size:14px}
@keyframes pulseNode{
  0%,100%{box-shadow:0 3px 0 var(--tomato-dark),0 0 0 0 rgba(230,59,46,.4)}
  50%{box-shadow:0 3px 0 var(--tomato-dark),0 0 0 6px rgba(230,59,46,0)}
}
.cl-conn{width:16px;height:3px;background:var(--border);flex-shrink:0;position:relative}
.cl-conn.done{background:var(--green-mid)}
.cl-conn::after{
  content:'';position:absolute;right:-3px;top:-2.5px;
  border:3.5px solid transparent;border-left-color:var(--border);
}
.cl-conn.done::after{border-left-color:var(--green-mid)}

/* ── RECIPE CARD ── */
.recipe-card{
  background:var(--surface);border-radius:16px;
  border:2.5px solid var(--border);border-bottom:7px solid var(--butter-mid);
  overflow:hidden;min-height:460px;
  box-shadow:6px 8px 0px rgba(245,200,66,0.2),0 2px 20px rgba(0,0,0,0.06);
  position:relative;
}
.card-inner{width:100%}
.card-inner.flipping{animation:pageFlip .5s cubic-bezier(.77,0,.18,1) both}
@keyframes pageFlip{
  0%{opacity:1;transform:scale(1)}
  35%{opacity:.7;transform:scale(0.97) rotateY(-6deg)}
  65%{opacity:.85;transform:scale(0.98) rotateY(2deg)}
  100%{opacity:1;transform:scale(1) rotateY(0)}
}

.page-strip{height:10px;position:relative;z-index:1}

/* ── LAYOUT ── */
.page-layout{display:grid;grid-template-columns:1fr;position:relative;z-index:1}
@media(min-width:580px){
  .page-layout{grid-template-columns:220px 1fr}
  .page-layout .illus-col{border-right:2px dashed var(--border)}
}
.illus-col{
  padding:24px 18px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--butter-pale),#fff);
  min-height:180px;
}
.text-col{padding:26px 24px 22px;position:relative}
.cover-layout{grid-template-columns:1fr!important}
.cover-layout .illus-col{
  border-right:none!important;
  background:linear-gradient(150deg,#E63B2E 0%,#F5C842 55%,#FFF8F0 100%);
  padding:36px 20px 32px;text-align:center;
}

/* ── PAGE META ── */
.page-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--tomato-pale);border:1.5px solid var(--tomato-mid);
  color:var(--tomato-dark);font-family:var(--mono);font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:20px;margin-bottom:10px;
}
.page-title{
  font-family:var(--script);font-size:25px;font-weight:700;
  color:var(--text);line-height:1.2;margin-bottom:12px;
}
.page-title .acc-r{color:var(--tomato)}
.page-title .acc-y{color:var(--butter-dark)}
.page-title .acc-g{color:var(--green)}
.page-body{font-family:var(--body);font-size:14.5px;line-height:1.75;color:var(--text-muted)}
.page-body strong{color:var(--text);font-weight:800}
.page-body em{color:var(--tomato);font-style:normal;font-weight:800}

/* ── TANYA AYAH BANNER ── */
.tanya-ayah{
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,#FFF9C4,#FFFDE7);
  border:2px solid var(--butter-mid);
  border-left:5px solid var(--butter-dark);
  border-radius:0 12px 12px 0;
  padding:10px 14px;margin-top:14px;
  font-family:var(--body);font-size:13px;font-weight:800;
  color:var(--brown);line-height:1.55;
  animation:stepIn .4s ease .6s both;
}
.tanya-ayah .ta-icon{font-size:22px;flex-shrink:0}
.tanya-ayah .ta-text{flex:1}
.tanya-ayah strong{color:var(--tomato-dark)}

/* ── RECIPE STEPS ── */
.recipe-steps{margin-top:10px}
.recipe-step{
  display:flex;align-items:flex-start;gap:12px;
  padding:9px 13px;
  background:var(--butter-pale);border-radius:10px;
  border:1.5px solid var(--butter-mid);border-left:5px solid var(--butter-dark);
  margin:6px 0;
  opacity:0;transform:translateX(-12px);animation:stepIn .35s ease forwards;
}
@keyframes stepIn{to{opacity:1;transform:none}}
.step-num{
  width:28px;height:28px;border-radius:50%;
  background:var(--tomato);color:#fff;
  font-family:var(--mono);font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;box-shadow:0 2px 0 var(--tomato-dark);
}
.step-text{font-family:var(--body);font-size:14px;font-weight:700;color:var(--text);line-height:1.5;padding-top:2px}

/* ── INFO BOXES ── */
.recipe-box{
  background:var(--tomato-pale);border:2px solid var(--tomato-mid);
  border-left:6px solid var(--tomato);border-radius:0 10px 10px 0;
  padding:12px 14px;margin-top:12px;font-size:13.5px;
  font-weight:700;color:var(--tomato-dark);line-height:1.65;font-family:var(--body);
}
.butter-box{
  background:var(--butter-pale);border:2px solid var(--butter-mid);
  border-left:6px solid var(--butter-dark);border-radius:0 10px 10px 0;
  padding:12px 14px;margin-top:12px;font-size:13.5px;
  font-weight:700;color:var(--brown);line-height:1.65;font-family:var(--body);
}
.green-box{
  background:var(--green-pale);border:2px solid var(--green-mid);
  border-left:6px solid var(--green);border-radius:0 10px 10px 0;
  padding:12px 14px;margin-top:12px;font-size:13.5px;
  font-weight:700;color:var(--green-dark);line-height:1.65;font-family:var(--body);
}

/* ── FLOWCHART ── */
.flow-wrap{margin:12px 0;display:flex;flex-direction:column;align-items:center;gap:0}
.flow-node{
  background:var(--surface);border:2.5px solid var(--tomato);
  border-radius:10px;padding:9px 18px;
  font-family:var(--body);font-size:13px;font-weight:800;
  color:var(--text);text-align:center;
  box-shadow:3px 4px 0 var(--tomato-mid);
  opacity:0;transform:translateY(-8px);animation:stepIn .35s ease forwards;min-width:160px;
}
.flow-node.green-node{background:var(--green-pale);border-color:var(--green);box-shadow:3px 4px 0 var(--green-mid)}
.flow-node.yellow-node{background:var(--butter-pale);border-color:var(--butter-dark);box-shadow:3px 4px 0 var(--butter-mid)}
.flow-arrow{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  margin:2px 0;opacity:0;animation:stepIn .3s ease forwards;
}
.arrow-line{width:2px;height:16px;background:var(--tomato-mid);border-left:2.5px dashed var(--tomato)}
.arrow-head{width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid var(--tomato)}
.flow-label{font-family:var(--mono);font-size:10px;color:var(--tomato-dark);font-weight:700}
.flow-row{display:flex;align-items:center;gap:10px;justify-content:center;width:100%}

/* ── CODE BLOCK ── */
.code-card{
  background:#1E1205;border-radius:10px;border:2px solid var(--brown);
  border-bottom:4px solid #0D0A05;padding:13px 15px;margin-top:12px;
  font-family:var(--mono);font-size:12.5px;line-height:1.9;position:relative;overflow:hidden;
}
.code-card::before{
  content:'resep.code';position:absolute;top:0;right:12px;
  font-family:var(--mono);font-size:9px;font-weight:700;color:rgba(245,200,66,.4);
}
.code-line{display:flex;align-items:center;gap:8px;opacity:0;transform:translateX(-8px);animation:stepIn .3s ease forwards}
.kw{color:#F5C842}.fn{color:#4ADE80}.str{color:#FCD34D}.cmt{color:#5D4037;font-style:italic}
.op{color:#F87171}.num{color:#FB923C}.val{color:#A3E635}

/* ── COMPARE ROWS ── */
.cmp-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 13px;border-radius:10px;margin:5px 0;
  font-family:var(--body);font-size:13.5px;font-weight:700;
  opacity:0;transform:translateX(-8px);animation:stepIn .35s ease forwards;
}
.cmp-row.red{background:var(--tomato-pale);color:var(--tomato-dark)}
.cmp-row.green{background:var(--green-pale);color:var(--green-dark)}
.cmp-row.yellow{background:var(--butter-pale);color:var(--brown)}
.cmp-icon{font-size:17px;flex-shrink:0}

/* ── COVER ── */
.cover-title{
  font-family:var(--script);font-size:34px;font-weight:700;
  color:#fff;line-height:1.15;margin-bottom:6px;
  text-shadow:2px 3px 12px rgba(0,0,0,.25);
}
.cover-sub{font-size:14px;color:rgba(255,255,255,.88);margin-bottom:8px;font-family:var(--body);font-weight:700}
.cover-name{font-family:var(--script);font-size:22px;font-weight:700;color:#FFF9C4;margin-bottom:8px}
.cover-badge{
  display:inline-block;background:rgba(255,255,255,.18);
  border:2px solid rgba(255,255,255,.35);color:#fff;
  font-family:var(--mono);font-size:12px;padding:4px 16px;border-radius:20px;
}
.chef-hat-anim{animation:chefBounce 1.5s ease infinite;display:inline-block}
@keyframes chefBounce{
  0%,100%{transform:translateY(0) rotate(-3deg)}
  50%{transform:translateY(-8px) rotate(3deg)}
}

/* ── END CARD ── */
.end-hero{
  background:linear-gradient(135deg,var(--tomato),var(--butter-dark));
  border-radius:14px;padding:20px;text-align:center;
  border:2.5px solid var(--tomato-dark);border-bottom:6px solid var(--brown);
  position:relative;overflow:hidden;margin:10px 0;
}
.end-hero::before{
  content:'🍳';position:absolute;font-size:100px;
  top:50%;left:50%;transform:translate(-50%,-50%);opacity:.07;pointer-events:none;
}
.end-title{font-family:var(--script);font-size:28px;font-weight:700;color:#fff;margin-bottom:8px}
.end-text{font-size:14px;color:rgba(255,255,255,.95);font-weight:700;line-height:1.75;font-family:var(--body)}
.next-box{
  background:var(--green-pale);border:2px solid var(--green-mid);
  border-left:6px solid var(--green);border-radius:0 12px 12px 0;
  padding:13px 16px;margin-top:12px;
}
.next-lbl{font-family:var(--mono);font-size:11px;color:var(--green-dark);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.next-title{font-family:var(--script);font-weight:700;font-size:18px;color:var(--green-dark)}

/* ── TANYA AYAH PENUTUP (special) ── */
.ayah-final{
  background:linear-gradient(135deg,#FFF9C4,#FFFBEA);
  border-radius:14px;border:2.5px solid var(--butter-mid);
  border-bottom:5px solid var(--butter-dark);
  padding:16px 18px;margin-top:14px;text-align:center;
}
.ayah-final .af-emoji{font-size:36px;display:block;margin-bottom:6px}
.ayah-final .af-title{font-family:var(--script);font-size:19px;font-weight:700;color:var(--tomato-dark);margin-bottom:6px}
.ayah-final .af-text{font-family:var(--body);font-size:13px;font-weight:700;color:var(--brown);line-height:1.65}
.ayah-final strong{color:var(--tomato-dark)}

/* ── NAV ── */
.nav-bar{display:flex;align-items:center;justify-content:space-between;margin-top:16px;gap:10px}
.nav-btn{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:2px solid var(--border);
  border-bottom:4px solid var(--butter-mid);color:var(--text);
  font-family:var(--body);font-weight:800;font-size:14px;
  padding:13px 22px;border-radius:12px;cursor:pointer;
  transition:all .12s;flex:1;justify-content:center;
  box-shadow:var(--shadow);user-select:none;-webkit-tap-highlight-color:transparent;
  min-height:52px;
}
.nav-btn:hover:not(:disabled){background:var(--butter-pale);border-color:var(--butter-dark);color:var(--brown);transform:translateY(-2px)}
.nav-btn:active:not(:disabled){transform:translateY(1px);box-shadow:var(--shadow-active);border-bottom-width:2px}
.nav-btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.nav-btn.primary{background:var(--tomato);border-color:var(--tomato-dark);border-bottom-color:var(--tomato-dark);color:#fff;flex:1.6}
.nav-btn.primary:hover:not(:disabled){background:var(--tomato-dark);color:#fff}
.nav-btn.reset{
  background:var(--butter-pale);border-color:var(--butter-mid);
  border-bottom-color:var(--butter-dark);color:var(--brown);
  width:100%;flex:none;justify-content:center;margin-top:8px;
}

.illus-svg{width:100%;max-width:200px;height:auto}

/* Stagger delays */
.recipe-step:nth-child(1),.code-line:nth-child(1),.cmp-row:nth-child(1),.flow-node:nth-child(1),.flow-arrow:nth-child(1){animation-delay:.05s}
.recipe-step:nth-child(2),.code-line:nth-child(2),.cmp-row:nth-child(2),.flow-node:nth-child(2),.flow-arrow:nth-child(2){animation-delay:.18s}
.recipe-step:nth-child(3),.code-line:nth-child(3),.cmp-row:nth-child(3),.flow-node:nth-child(3),.flow-arrow:nth-child(3){animation-delay:.31s}
.recipe-step:nth-child(4),.code-line:nth-child(4),.cmp-row:nth-child(4),.flow-node:nth-child(4),.flow-arrow:nth-child(4){animation-delay:.44s}
.recipe-step:nth-child(5),.code-line:nth-child(5),.flow-node:nth-child(5),.flow-arrow:nth-child(5){animation-delay:.57s}
.recipe-step:nth-child(6),.code-line:nth-child(6){animation-delay:.70s}
.recipe-step:nth-child(7){animation-delay:.83s}

@media(max-width:420px){
  .cover-title{font-size:26px}
  .page-title{font-size:21px}
  .nav-btn{font-size:13px;padding:11px 14px}
  .tanya-ayah{font-size:12px}
}
</style>
</head>
<body>
<div class="bg-deco">
  <span>🍳</span><span>🥄</span><span>👨‍🍳</span><span>🧑‍🍳</span><span>🥘</span>
</div>

<div class="wrapper">

  <!-- TOP BAR -->
  <div class="topbar">
    <a class="back-btn" href="..\/perpustakaan.html">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Perpustakaan
    </a>
    <div class="brand-pill">🍴 Flipbook Edukasi</div>
    <div class="series-badge">SERI #13</div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-row">
    <div class="circ-wrap">
      <svg width="54" height="54" viewBox="0 0 54 54">
        <circle class="c-track" cx="27" cy="27" r="22"/>
        <circle class="c-fill" id="cFill" cx="27" cy="27" r="22" stroke-dashoffset="138.16"/>
      </svg>
      <div class="c-lbl" id="cLbl">01</div>
    </div>
    <div class="prog-text">Halaman <span id="pgCur">1</span> dari <span id="pgTot">13</span></div>
  </div>

  <!-- CHECKLIST NAV -->
  <div class="checklist-wrap">
    <div class="checklist" id="checklist"></div>
  </div>

  <!-- CARD -->

/* ── BUILD CHECKLIST ── */
function buildChecklist(){
  const cl=document.getElementById('checklist');
  cl.innerHTML='';
  for(let i=1;i<=TOTAL;i++){
    const n=document.createElement('div');
    n.className='cl-node'+(i===cur?' active':i<cur?' done':'');
    n.textContent=i<cur?'✓':String(i).padStart(2,'0');
    n.onclick=()=>goTo(i);
    cl.appendChild(n);
    if(i<TOTAL){
      const c=document.createElement('div');
      c.className='cl-conn'+(i<cur?' done':'');
      cl.appendChild(c);
    }
  }
  const active=cl.querySelector('.active');
  if(active) active.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
}

/* ── PROGRESS ── */
function updateProgress(){
  const pct=cur/TOTAL;
  const circ=138.16;
  document.getElementById('cFill').style.strokeDashoffset=circ*(1-pct);
  document.getElementById('cLbl').textContent=String(cur).padStart(2,'0');
  document.getElementById('pgCur').textContent=cur;
  document.getElementById('pgTot').textContent=TOTAL;
  const fill=document.getElementById('cFill');
  fill.style.stroke=pct<0.4?'var(--tomato)':pct<0.8?'var(--butter-dark)':'var(--green)';
}

/* ── RENDER ── */
function render(){
  const p=pages[cur-1];
  const inner=document.getElementById('cardInner');
  inner.classList.remove('flipping');
  void inner.offsetWidth;
  inner.classList.add('flipping');

  if(p.layout==='cover'){
    document.getElementById('pageContent').innerHTML=`
      <div class="page-strip" style="${p.strip}"></div>
      <div class="page-layout cover-layout">
        <div class="illus-col">
          <div class="cover-title">Algoritma:<br>Resep Masak<br>Paling Keren!</div>
          <div class="cover-sub">Petualangan Teknologi Bersama</div>
          <div class="chef-hat-anim" style="font-size:52px;margin:8px 0">👨‍🍳</div>
          ${p.illus||''}
          <div style="font-family:var(--script);font-size:22px;font-weight:700;color:#FFF9C4;margin:6px 0">✨ Aslan ✨</div>
          <div style="display:inline-block;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.35);color:#fff;font-family:var(--mono);font-size:12px;padding:4px 16px;border-radius:20px">FLIPBOOK EDUKASI · SERI 13</div>
        </div>
      </div>`;
  } else {
    document.getElementById('pageContent').innerHTML=`
      <div class="page-strip" style="${p.strip}"></div>
      <div class="page-layout">
        <div class="illus-col">${p.illus||''}</div>
        <div class="text-col">${p.html}</div>
      </div>`;
  }

  updateProgress();
  document.getElementById('prevBtn').disabled=(cur===1);
  const nb=document.getElementById('nextBtn');
  nb.disabled=(cur===TOTAL);
  nb.textContent=cur===TOTAL?'🎉 Selesai!':'🍳 Selanjutnya';
  buildChecklist();
  window.scrollTo({top:0,behavior:'smooth'});
}

function go(d){const n=cur+d;if(n>=1&&n<=TOTAL){cur=n;render()}}
function goTo(n){cur=n;render()}
function reset(){cur=1;render()}

// Keyboard support
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') go(-1);
});

// Touch swipe
let tsx=0;
document.addEventListener('touchstart',e=>{tsx=e.changedTouches[0].clientX},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tsx;
  if(Math.abs(dx)>50) go(dx<0?1:-1);
},{passive:true});

render();
</script>
