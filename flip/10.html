<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulang Terus-terusan! Rahasia Loop — Flipbook Seri 10</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Nunito:wght@400;700;800;900&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#F97316;
  --orange-dark:#C2410C;
  --orange-pale:#FFF7ED;
  --orange-mid:#FED7AA;
  --purple:#7C3AED;
  --purple-dark:#5B21B6;
  --purple-pale:#F5F3FF;
  --purple-mid:#C4B5FD;
  --green:#16A34A;
  --green-dark:#0F7035;
  --green-pale:#E6F7EE;
  --green-mid:#A3DBBE;
  --red:#EF4444;
  --red-pale:#FEE2E2;
  --blue:#1A6CF6;
  --blue-dark:#0F4DB8;
  --blue-pale:#E8F0FF;
  --bg:#FFF7ED;
  --surface:#FFFFFF;
  --text:#1A0A00;
  --text-muted:#6B4226;
  --border:#FED7AA;
  --border-dark:#F97316;
  --mono:'JetBrains Mono',monospace;
  --sans:'Sora',sans-serif;
  --body:'Nunito',sans-serif;
  --block-shadow:3px 4px 0px rgba(249,115,22,0.22);
  --block-shadow-active:1px 2px 0px rgba(249,115,22,0.22);
}

body{
  font-family:var(--body);
  background:var(--bg);
  min-height:100vh;
  padding:16px;
  color:var(--text);
  overflow-x:hidden;
}

/* SVG gear background */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(249,115,22,0.07) 0%, transparent 50%),
    radial-gradient(circle at 85% 80%, rgba(124,58,237,0.07) 0%, transparent 50%),
    linear-gradient(rgba(249,115,22,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(249,115,22,0.04) 1px,transparent 1px);
  background-size:100% 100%,100% 100%,28px 28px,28px 28px;
  pointer-events:none;
  z-index:0;
}

/* Animated loop arrows in background */
.bg-loops{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.bg-loop{
  position:absolute;
  border:2.5px solid rgba(249,115,22,0.08);
  border-radius:50%;
  animation:spin linear infinite;
}
.bg-loop::after{
  content:'';
  position:absolute;
  top:-6px; right:30%;
  width:10px; height:10px;
  background:rgba(249,115,22,0.12);
  border-radius:50%;
}
.bg-loop:nth-child(1){width:200px;height:200px;top:-60px;left:-60px;animation-duration:18s}
.bg-loop:nth-child(2){width:150px;height:150px;bottom:10%;right:-40px;animation-duration:12s;border-color:rgba(124,58,237,0.08)}
.bg-loop:nth-child(3){width:100px;height:100px;bottom:30%;left:5%;animation-duration:22s;border-color:rgba(249,115,22,0.06)}
.bg-loop:nth-child(4){width:280px;height:280px;top:30%;right:-100px;animation-duration:30s;border-color:rgba(124,58,237,0.05)}

@keyframes spin{to{transform:rotate(360deg)}}

.wrapper{
  position:relative;
  z-index:1;
  max-width:780px;
  margin:0 auto;
}

/* ── TOP BAR ── */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
  gap:10px;
  flex-wrap:wrap;
}
.brand-pill{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--orange);
  color:#fff;
  font-family:var(--sans);
  font-weight:700;
  font-size:13px;
  padding:6px 14px;
  border-radius:6px;
  box-shadow:var(--block-shadow);
  border-bottom:3px solid var(--orange-dark);
}
.back-lib-btn{
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--surface);
  border:2px solid var(--border);
  border-bottom:3px solid var(--border-dark);
  color:var(--text);
  font-family:var(--sans);
  font-weight:700;
  font-size:13px;
  padding:6px 14px;
  border-radius:6px;
  cursor:pointer;
  text-decoration:none;
  transition:all .12s;
  box-shadow:var(--block-shadow);
}
.back-lib-btn:hover{
  background:var(--orange-pale);
  border-color:var(--orange);
  color:var(--orange-dark);
  transform:translateY(-2px);
}
.back-lib-btn:active{
  transform:translateY(1px);
  box-shadow:var(--block-shadow-active);
  border-bottom-width:2px;
}
.series-badge{
  background:var(--purple-pale);
  border:2px solid var(--purple-mid);
  color:var(--purple-dark);
  font-family:var(--mono);
  font-size:11px;
  font-weight:600;
  padding:4px 12px;
  border-radius:4px;
}

/* ── CIRCULAR PROGRESS ── */
.progress-area{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:12px;
}
.circ-progress{
  position:relative;
  width:54px; height:54px;
  flex-shrink:0;
}
.circ-progress svg{
  transform:rotate(-90deg);
}
.circ-track{stroke:var(--border);fill:none;stroke-width:4}
.circ-fill{
  fill:none;
  stroke-width:4;
  stroke:var(--orange);
  stroke-linecap:round;
  transition:stroke-dashoffset .5s ease;
  stroke-dasharray:138.16;
}
.circ-label{
  position:absolute;
  inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);
  font-size:10px;
  font-weight:700;
  color:var(--orange-dark);
}
.progress-text{
  font-family:var(--sans);
  font-size:13px;
  font-weight:700;
  color:var(--text-muted);
}
.progress-text span{color:var(--orange);font-weight:800}

/* ── ROADMAP NAV ── */
.roadmap-wrap{
  margin-bottom:16px;
  overflow-x:auto;
  padding-bottom:6px;
}
.roadmap{
  display:flex;
  align-items:center;
  gap:0;
  min-width:max-content;
  padding:4px 2px;
}
.rm-node{
  width:32px;height:32px;
  border-radius:50%;
  background:var(--surface);
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);
  font-size:10px;
  font-weight:700;
  color:var(--text-muted);
  cursor:pointer;
  transition:all .15s;
  flex-shrink:0;
  box-shadow:0 2px 0 var(--border);
}
.rm-node:hover{background:var(--orange-pale);border-color:var(--orange);color:var(--orange-dark)}
.rm-node.active{
  background:var(--orange);border-color:var(--orange-dark);color:#fff;
  transform:translateY(-2px);
  box-shadow:0 3px 0 var(--orange-dark);
  animation:nodePulse 1.5s ease infinite;
}
.rm-node.done{background:var(--purple-pale);border-color:var(--purple);color:var(--purple)}
@keyframes nodePulse{
  0%,100%{box-shadow:0 3px 0 var(--orange-dark), 0 0 0 0 rgba(249,115,22,.4)}
  50%{box-shadow:0 3px 0 var(--orange-dark), 0 0 0 6px rgba(249,115,22,0)}
}
.rm-connector{
  width:18px;height:3px;
  background:var(--border);
  flex-shrink:0;
  position:relative;
}
.rm-connector.done{background:var(--purple-mid)}
.rm-connector::after{
  content:'';
  position:absolute;
  right:-3px;top:-2.5px;
  border:3.5px solid transparent;
  border-left-color:var(--border);
}
.rm-connector.done::after{border-left-color:var(--purple-mid)}

/* ── PAGE CARD ── */
.page-card{
  background:var(--surface);
  border-radius:14px;
  border:2.5px solid var(--border);
  border-bottom:6px solid var(--orange-mid);
  overflow:hidden;
  min-height:460px;
  box-shadow:5px 7px 0px rgba(249,115,22,0.13);
  animation:cardIn .35s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:scale(.97) translateY(8px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.page-strip{
  height:8px;
}

/* ── LAYOUT ── */
.page-layout{
  display:grid;
  grid-template-columns:1fr;
}
@media(min-width:600px){
  .page-layout{grid-template-columns:1fr 1fr}
  .page-layout .illus-col{border-right:2px solid var(--border)}
}
.illus-col{
  padding:28px 24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,var(--orange-pale),#fff);
  min-height:220px;
}
.text-col{padding:28px 26px 24px}

.cover-layout{grid-template-columns:1fr!important}
.cover-layout .illus-col{
  border-right:none!important;
  background:linear-gradient(150deg,#7C3AED 0%,#F97316 60%,#FBBF24 100%);
  padding:40px 24px 36px;
  align-items:center;
  text-align:center;
}

/* ── PAGE META ── */
.page-tag{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:var(--orange-pale);
  border:1.5px solid var(--orange-mid);
  color:var(--orange-dark);
  font-family:var(--mono);
  font-size:11px;
  font-weight:600;
  padding:3px 10px;
  border-radius:20px;
  margin-bottom:12px;
}
.page-title{
  font-family:var(--sans);
  font-size:22px;
  font-weight:800;
  color:var(--text);
  line-height:1.25;
  margin-bottom:14px;
}
.page-title .accent{color:var(--orange)}
.page-title .accent2{color:var(--purple)}
.page-body{
  font-family:var(--body);
  font-size:14.5px;
  line-height:1.75;
  color:var(--text-muted);
}
.page-body strong{color:var(--text);font-weight:800}
.page-body em{color:var(--orange);font-style:normal;font-weight:700}

/* ── LOOP BLOCK (glowing border) ── */
.loop-block{
  position:relative;
  background:#0D1B2A;
  border-radius:10px;
  border:2px solid #1E3A5F;
  border-bottom:4px solid #0A1220;
  padding:14px 16px;
  margin-top:14px;
  font-family:var(--mono);
  font-size:12.5px;
  line-height:1.8;
  overflow:hidden;
}
.loop-block::before{
  content:'';
  position:absolute;
  inset:-1px;
  border-radius:10px;
  background:conic-gradient(from var(--angle,0deg), transparent 70%, rgba(249,115,22,.7) 80%, rgba(124,58,237,.7) 90%, transparent 100%);
  animation:spinGlow 2.5s linear infinite;
  z-index:0;
  pointer-events:none;
}
.loop-block::after{
  content:'';
  position:absolute;
  inset:2px;
  background:#0D1B2A;
  border-radius:8px;
  z-index:1;
}
.loop-block > *{position:relative;z-index:2}
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}
@keyframes spinGlow{to{--angle:360deg}}

.code-line{
  display:flex;
  align-items:center;
  gap:10px;
  opacity:0;
  transform:translateY(-10px);
  animation:slideDown .3s ease forwards;
}
.code-line .kw{color:#60A5FA}
.code-line .fn{color:#34D399}
.code-line .str{color:#FCD34D}
.code-line .cmt{color:#4B5563;font-style:italic}
.code-line .op{color:#F472B6}
.code-line .num{color:#FB923C}

@keyframes slideDown{to{opacity:1;transform:translateY(0)}}

/* ── LEGO BLOCKS ── */
.lego-block{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--orange);
  color:#fff;
  font-family:var(--mono);
  font-size:12px;
  font-weight:600;
  padding:9px 14px;
  border-radius:8px;
  border-bottom:3px solid var(--orange-dark);
  margin:6px 0;
  position:relative;
  box-shadow:var(--block-shadow);
  opacity:0;
  transform:translateY(-10px);
  animation:slideDown .3s ease forwards;
}
.lego-block.purple{background:var(--purple);border-bottom-color:var(--purple-dark)}
.lego-block.green{background:var(--green);border-bottom-color:var(--green-dark)}
.lego-block.blue{background:var(--blue);border-bottom-color:var(--blue-dark)}
.lego-block::before{
  content:'';
  position:absolute;
  left:-5px;top:50%;transform:translateY(-50%);
  width:8px;height:14px;
  background:inherit;
  border-radius:3px 0 0 3px;
  opacity:.7;
}

/* ── LOOP REPEAT BLOCK ── */
.repeat-block{
  background:var(--purple-pale);
  border:2.5px solid var(--purple-mid);
  border-left:6px solid var(--purple);
  border-radius:0 10px 10px 0;
  padding:12px 14px 12px 18px;
  margin:10px 0;
}
.repeat-label{
  font-family:var(--mono);
  font-size:11px;
  font-weight:700;
  color:var(--purple-dark);
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:6px;
}
.repeat-inner{
  background:#fff;
  border:1.5px solid var(--purple-mid);
  border-radius:6px;
  padding:8px 12px;
}
.repeat-inner .code-line{font-family:var(--mono);font-size:12px}

/* ── INFO BOXES ── */
.fun-box{
  background:var(--green-pale);
  border:2px solid var(--green-mid);
  border-left:5px solid var(--green);
  border-radius:0 8px 8px 0;
  padding:12px 14px;
  margin-top:14px;
  font-size:13px;
  font-weight:700;
  color:#065F46;
  line-height:1.6;
}
.warn-box{
  background:var(--red-pale);
  border:2px solid #FCA5A5;
  border-left:5px solid var(--red);
  border-radius:0 8px 8px 0;
  padding:12px 14px;
  margin-top:14px;
  font-size:13px;
  font-weight:700;
  color:#991B1B;
  line-height:1.6;
}
.orange-box{
  background:var(--orange-pale);
  border:2px solid var(--orange-mid);
  border-left:5px solid var(--orange);
  border-radius:0 8px 8px 0;
  padding:12px 14px;
  margin-top:14px;
  font-size:13px;
  font-weight:700;
  color:var(--orange-dark);
  line-height:1.6;
}
.purple-box{
  background:var(--purple-pale);
  border:2px solid var(--purple-mid);
  border-left:5px solid var(--purple);
  border-radius:0 8px 8px 0;
  padding:12px 14px;
  margin-top:14px;
  font-size:13px;
  font-weight:700;
  color:var(--purple-dark);
  line-height:1.6;
}

/* ── SEQ STEPS ── */
.seq-step{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:10px 12px;
  background:var(--orange-pale);
  border-radius:8px;
  border:1.5px solid var(--orange-mid);
  margin:6px 0;
  opacity:0;
  transform:translateY(-10px);
  animation:slideDown .35s ease forwards;
}
.seq-num{
  width:26px;height:26px;
  border-radius:50%;
  background:var(--orange);
  color:#fff;
  font-family:var(--mono);
  font-size:12px;
  font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 2px 0 var(--orange-dark);
}
.seq-text{
  font-family:var(--body);
  font-size:13.5px;
  font-weight:700;
  color:var(--text);
  line-height:1.5;
  padding-top:2px;
}

/* ── COMPARE ── */
.compare-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:9px 12px;
  border-radius:8px;
  margin:5px 0;
  font-family:var(--body);
  font-size:13px;
  font-weight:700;
  opacity:0;
  transform:translateY(-8px);
  animation:slideDown .3s ease forwards;
}
.compare-row.correct{background:var(--green-pale);color:#065F46}
.compare-row.orange{background:var(--orange-pale);color:var(--orange-dark)}
.compare-row.purple{background:var(--purple-pale);color:var(--purple-dark)}
.cmp-icon{font-size:16px;flex-shrink:0}

/* ── COVER ── */
.cover-title{
  font-family:var(--sans);
  font-size:30px;
  font-weight:800;
  color:#fff;
  line-height:1.15;
  margin-bottom:8px;
  text-shadow:0 2px 12px rgba(0,0,0,.2);
}
.cover-sub{
  font-size:15px;
  color:rgba(255,255,255,.85);
  margin-bottom:12px;
  font-family:var(--body);
}
.cover-name{
  font-family:var(--sans);
  font-size:20px;
  font-weight:800;
  color:#FFF9C4;
  margin-bottom:8px;
}
.cover-badge{
  display:inline-block;
  background:rgba(255,255,255,.15);
  border:2px solid rgba(255,255,255,.3);
  color:#fff;
  font-family:var(--mono);
  font-size:12px;
  padding:4px 14px;
  border-radius:20px;
}
.cover-loop-icon{
  font-size:52px;
  margin:10px 0 14px;
  animation:bounceLoop 1.2s ease infinite;
}
@keyframes bounceLoop{
  0%,100%{transform:rotate(0deg) scale(1)}
  50%{transform:rotate(180deg) scale(1.1)}
}

/* ── END CARD ── */
.end-card{
  background:linear-gradient(135deg,var(--orange),var(--purple));
  border-radius:12px;
  padding:20px;
  text-align:center;
  margin:14px 0;
  border:2px solid var(--orange-dark);
  border-bottom:5px solid var(--purple-dark);
  position:relative;
  overflow:hidden;
}
.end-card::before{
  content:'∞';
  position:absolute;
  font-size:120px;
  color:rgba(255,255,255,.07);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:var(--sans);
  pointer-events:none;
}
.end-title{
  font-family:var(--sans);
  font-size:22px;
  font-weight:800;
  color:#fff;
  margin-bottom:8px;
  position:relative;
}
.end-text{
  font-size:13.5px;
  color:rgba(255,255,255,.95);
  font-weight:700;
  line-height:1.7;
  position:relative;
}
.next-book{
  background:var(--green-pale);
  border:2px solid var(--green-mid);
  border-left:5px solid var(--green);
  border-radius:0 10px 10px 0;
  padding:14px 16px;
  margin-top:12px;
}
.next-label{
  font-family:var(--mono);
  font-size:11px;
  color:var(--green-dark);
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:4px;
}
.next-title{
  font-family:var(--sans);
  font-weight:700;
  font-size:14px;
  color:var(--green-dark);
}

/* ── NAV BUTTONS ── */
.nav-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:16px;
  gap:10px;
}
.nav-btn{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--surface);
  border:2px solid var(--border);
  border-bottom:4px solid var(--orange-mid);
  color:var(--text);
  font-family:var(--sans);
  font-weight:700;
  font-size:14px;
  padding:12px 20px;
  border-radius:10px;
  cursor:pointer;
  transition:all .12s;
  flex:1;
  justify-content:center;
  box-shadow:var(--block-shadow);
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.nav-btn:hover:not(:disabled){
  background:var(--orange-pale);
  border-color:var(--orange);
  color:var(--orange-dark);
  transform:translateY(-2px);
}
.nav-btn:active:not(:disabled){
  transform:translateY(1px);
  box-shadow:var(--block-shadow-active);
  border-bottom-width:2px;
}
.nav-btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.nav-btn.primary{
  background:var(--orange);
  border-color:var(--orange-dark);
  border-bottom-color:var(--orange-dark);
  color:#fff;
  flex:1.6;
}
.nav-btn.primary:hover:not(:disabled){
  background:var(--orange-dark);
  color:#fff;
}
.nav-btn.reset{
  background:var(--purple-pale);
  border-color:var(--purple-mid);
  border-bottom-color:var(--purple);
  color:var(--purple-dark);
  width:100%;
  margin-top:8px;
  flex:none;
  justify-content:center;
}
.nav-btn.reset:hover{
  background:var(--purple-pale);
  border-color:var(--purple);
  color:var(--purple-dark);
}

/* ── ILLUS SVG ── */
.illus-svg{width:100%;max-width:260px;height:auto}

/* ── STAGGER ── */
.code-line:nth-child(1),.lego-block:nth-child(1),.seq-step:nth-child(1),.compare-row:nth-child(1){animation-delay:.05s}
.code-line:nth-child(2),.lego-block:nth-child(2),.seq-step:nth-child(2),.compare-row:nth-child(2){animation-delay:.18s}
.code-line:nth-child(3),.lego-block:nth-child(3),.seq-step:nth-child(3),.compare-row:nth-child(3){animation-delay:.31s}

/* ── ROADMAP ── */
function buildRoadmap(){
  const rm = document.getElementById('roadmap');
  rm.innerHTML = '';
  for(let i=1;i<=TOTAL;i++){
    const n = document.createElement('div');
    n.className = 'rm-node' + (i===cur?' active':i<cur?' done':'');
    n.textContent = String(i).padStart(2,'0');
    n.onclick = ()=>goTo(i);
    rm.appendChild(n);
    if(i<TOTAL){
      const c = document.createElement('div');
      c.className = 'rm-connector' + (i<cur?' done':'');
      rm.appendChild(c);
    }
  }
  const active = rm.querySelector('.active');
  if(active) active.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
}

/* ── CIRCULAR PROGRESS ── */
function updateProgress(){
  const pct = cur / TOTAL;
  const circumference = 138.16;
  const offset = circumference * (1 - pct);
  document.getElementById('circFill').style.strokeDashoffset = offset;
  document.getElementById('circLabel').textContent = String(cur).padStart(2,'0');
  document.getElementById('pgCurrent').textContent = cur;
  document.getElementById('pgTotal').textContent = TOTAL;
  // Color shift
  const fill = document.getElementById('circFill');
  if(pct < 0.4) fill.style.stroke = 'var(--orange)';
  else if(pct < 0.8) fill.style.stroke = 'var(--purple)';
  else fill.style.stroke = 'var(--green)';
}

/* ── RENDER ── */
function render(){
  const p = pages[cur-1];
  const card = document.getElementById('pageCard');

  if(p.layout === 'cover'){
    card.innerHTML = `
      <div class="page-strip" style="${p.strip}"></div>
      <div class="page-layout cover-layout">
        <div class="illus-col">
          <div class="cover-title">Ulang Terus-<br>terusan!</div>
          <div class="cover-sub">Rahasia Loop dalam Coding</div>
          <div class="cover-loop-icon">🔁</div>
          ${p.illus || ''}
          <div class="cover-name">✨ Aslan ✨</div>
          <div class="cover-badge">FLIPBOOK EDUKASI · SERI 10</div>
        </div>
      </div>`;
  } else {
    card.innerHTML = `
      <div class="page-strip" style="${p.strip}"></div>
      <div class="page-layout">
        <div class="illus-col">${p.illus || ''}</div>
        <div class="text-col">${p.html}</div>
      </div>`;
  }

  // Re-trigger card animation
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = '';

  updateProgress();

  document.getElementById('prevBtn').disabled = (cur === 1);
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.disabled = (cur === TOTAL);
  nextBtn.textContent = cur === TOTAL ? '🎉 Selesai!' : 'Selanjutnya →';

  buildRoadmap();
  window.scrollTo({top:0,behavior:'smooth'});
}

function go(d){
  const n = cur + d;
  if(n >= 1 && n <= TOTAL){ cur = n; render(); }
}
function goTo(n){ cur = n; render(); }
function reset(){ cur = 1; render(); }

render();
</script>
