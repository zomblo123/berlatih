<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scratch: Coding dengan Balok Mainan — Seri 14</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,800;0,900;1,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   SCRATCH FLIPBOOK — GLOBAL TOKENS
═══════════════════════════════════════════════ */
:root{
  /* Official Scratch palette */
  --sc-motion:  #4C97FF;  /* blue  – Motion */
  --sc-motion-d:#3373CC;
  --sc-looks:   #9966FF;  /* purple – Looks  */
  --sc-looks-d: #7744DD;
  --sc-sound:   #CF63CF;  /* pink  – Sound  */
  --sc-events:  #FFAB19;  /* orange – Events */
  --sc-events-d:#E6950A;
  --sc-control: #FFAB19;
  --sc-ops:     #59C059;  /* green – Operators */
  --sc-ops-d:   #3DA13D;
  --sc-vars:    #FF8C1A;  /* dark-orange – Variables */
  --sc-stop:    #FF6680;
  --sc-stop-d:  #D44466;
  --sc-bg:      #F9F9F9;
  --sc-panel:   #E5E5E5;
  --sc-editor:  #1E1E2E;
  --sc-white:   #FFFFFF;
  --sc-text:    #1E1E2E;
  --sc-muted:   #555;
  --sc-border:  #D0D0D0;
  --notch-r: 5px;
  --block-h: 8px;   /* notch height */
  --block-w: 28px;  /* notch width */
  --block-off:16px; /* notch x offset */
  --font-ui:'Space Grotesk',sans-serif;
  --font-body:'Nunito',sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:var(--font-body)}

body{
  background: #F0F4FC;
  background-image:
    radial-gradient(circle at 20% 50%, rgba(76,151,255,.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(153,102,255,.08) 0%, transparent 40%);
  padding:14px 12px 80px;
  color:var(--sc-text);
}

/* ─── SCRATCH BLOCK SHAPE ─── */
/* A block has a notch on top and a notch-socket on bottom,
   achieved via clip-path + SVG path approach replaced by
   a simpler CSS-only puzzle outline using border-radius + pseudo */
.scratch-card{
  background:var(--sc-white);
  border-radius:12px;
  border:2.5px solid var(--sc-border);
  box-shadow:
    0 4px 0 0 rgba(0,0,0,.12),
    0 8px 24px rgba(0,0,0,.07);
  position:relative;
  overflow:visible;
}
/* Top "tab" notch — the iconic Scratch connector */
.scratch-card::before{
  content:'';
  position:absolute;
  top:-10px;
  left:var(--block-off);
  width:var(--block-w);
  height:var(--block-h)+2px;
  background:var(--notch-color, var(--sc-motion));
  border-radius:var(--notch-r) var(--notch-r) 0 0;
  border:2.5px solid rgba(0,0,0,.15);
  border-bottom:none;
  z-index:2;
}
/* Bottom "socket" notch */
.scratch-card::after{
  content:'';
  position:absolute;
  bottom:-10px;
  left:var(--block-off);
  width:var(--block-w);
  height:10px;
  background:var(--sc-white);
  border-radius:0 0 var(--notch-r) var(--notch-r);
  border:2.5px solid rgba(0,0,0,.12);
  border-top:none;
  z-index:2;
}

/* ─── WRAPPER ─── */
.wrapper{
  max-width:820px;
  margin:0 auto;
  position:relative;
}

/* ─── TOP NAV BAR ─── */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
  gap:10px;
  flex-wrap:wrap;
}
.back-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--sc-white);
  border:2.5px solid var(--sc-border);
  border-bottom:4px solid var(--sc-border);
  color:var(--sc-text);
  font-family:var(--font-ui);font-weight:600;font-size:13px;
  padding:7px 16px;border-radius:8px;
  text-decoration:none;cursor:pointer;
  transition:all .15s;
  box-shadow:0 2px 0 rgba(0,0,0,.1);
}
.back-btn:hover{
  background:var(--sc-motion);color:#fff;
  border-color:var(--sc-motion-d);
  transform:translateY(-2px);
  box-shadow:0 4px 0 rgba(0,0,0,.15);
}
.back-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.series-pill{
  background:var(--sc-events);
  color:#fff;
  font-family:var(--font-ui);font-weight:700;font-size:12px;
  padding:5px 14px;border-radius:20px;
  border-bottom:3px solid var(--sc-events-d);
  white-space:nowrap;
}

/* ─── PROGRESS ─── */
.progress-wrap{margin-bottom:16px}
.progress-track{
  height:10px;
  background:var(--sc-panel);
  border-radius:5px;
  overflow:hidden;
  border:1.5px solid var(--sc-border);
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--sc-motion),var(--sc-ops));
  border-radius:5px;
  transition:width .5s cubic-bezier(.34,1.56,.64,1);
}
.progress-label{
  font-family:var(--font-ui);font-size:11px;
  color:var(--sc-muted);
  margin-top:5px;
  text-align:right;
}

/* ─── PAGE DOTS ─── */
.page-dots{
  display:flex;gap:5px;flex-wrap:wrap;
  justify-content:center;margin-bottom:16px;
}
.dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--sc-panel);
  border:1.5px solid var(--sc-border);
  cursor:pointer;transition:all .15s;
}
.dot.active{
  background:var(--sc-motion);
  border-color:var(--sc-motion-d);
  transform:scale(1.3);
}
.dot.done{background:var(--sc-ops);border-color:var(--sc-ops-d)}

/* ─── MAIN PAGE CARD ─── */
.page-card{
  --notch-color:var(--sc-motion);
  background:var(--sc-white);
  border-radius:16px;
  border:3px solid var(--sc-border);
  border-bottom:6px solid #bbb;
  overflow:hidden;
  position:relative;
  box-shadow:
    0 6px 0 rgba(0,0,0,.1),
    0 16px 40px rgba(0,0,0,.08);
  /* snap animation */
  animation:snapIn .35s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes snapIn{
  from{transform:translateY(-18px) scale(.97);opacity:0}
  to{transform:translateY(0) scale(1);opacity:1}
}

/* Color strip at top */
.color-strip{height:10px;width:100%}

/* Two column layout */
.page-body-wrap{
  display:grid;
  grid-template-columns:1fr;
}
@media(min-width:580px){
  .page-body-wrap{grid-template-columns:240px 1fr}
  .illus-col{border-right:2px solid var(--sc-panel)}
}
.illus-col{
  padding:28px 20px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:linear-gradient(145deg,#F0F4FC,#E8EEF8);
  min-height:200px;
}
.text-col{
  padding:26px 24px 22px;
}

/* ─── SCRATCH BLOCKS (inline) ─── */
.sc-block{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px;border-radius:6px;
  font-family:var(--font-ui);font-weight:700;font-size:13px;
  color:#fff;margin:5px 0;
  position:relative;
  box-shadow:0 3px 0 rgba(0,0,0,.2);
  animation:blockDrop .3s cubic-bezier(.34,1.56,.64,1) both;
  cursor:default;user-select:none;
}
.sc-block::before{
  content:'';
  position:absolute;top:-7px;left:12px;
  width:22px;height:7px;
  background:inherit;
  border-radius:4px 4px 0 0;
  filter:brightness(.85);
}
.sc-block::after{
  content:'';
  position:absolute;bottom:-7px;left:12px;
  width:22px;height:7px;
  background:inherit;
  border-radius:0 0 4px 4px;
  filter:brightness(.85);
}
.sc-block.motion{background:var(--sc-motion)}
.sc-block.looks{background:var(--sc-looks)}
.sc-block.events{background:var(--sc-events)}
.sc-block.control{background:var(--sc-events);color:#fff}
.sc-block.ops{background:var(--sc-ops)}
.sc-block.sound{background:var(--sc-sound)}
.sc-block.vars{background:var(--sc-vars)}

@keyframes blockDrop{
  from{opacity:0;transform:translateY(-10px)}
  to{opacity:1;transform:translateY(0)}
}
.sc-block:nth-child(1){animation-delay:.05s}
.sc-block:nth-child(2){animation-delay:.15s}
.sc-block:nth-child(3){animation-delay:.25s}
.sc-block:nth-child(4){animation-delay:.35s}
.sc-block:nth-child(5){animation-delay:.45s}
.sc-block:nth-child(6){animation-delay:.55s}
.sc-block.field{
  background:rgba(255,255,255,.25);
  border-radius:4px;padding:1px 6px;
  font-size:12px;
}

/* ─── TEXT STYLES ─── */
.page-num{
  display:inline-block;
  background:var(--sc-editor);
  color:#fff;
  font-family:var(--font-ui);font-size:11px;font-weight:600;
  padding:2px 10px;border-radius:4px;margin-bottom:10px;
  letter-spacing:.5px;
}
.page-title{
  font-family:var(--font-ui);font-weight:700;font-size:22px;
  line-height:1.25;margin-bottom:12px;color:var(--sc-text);
}
.page-title .hl{color:var(--sc-motion)}
.page-text{
  font-family:var(--font-body);font-size:14.5px;
  line-height:1.75;color:var(--sc-muted);
}
.page-text strong{color:var(--sc-text);font-weight:800}
.page-text em{color:var(--sc-motion);font-style:normal;font-weight:700}

.tip-box{
  background:linear-gradient(135deg,#EEF5FF,#E6EDFF);
  border:2px solid var(--sc-motion);
  border-left:5px solid var(--sc-motion);
  border-radius:0 8px 8px 0;
  padding:12px 14px;margin-top:14px;
  font-family:var(--font-body);font-size:13px;font-weight:700;
  color:#0F3580;line-height:1.6;
}
.feature-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--sc-panel);
  border:1.5px solid var(--sc-border);
  border-radius:20px;
  padding:5px 12px;margin:3px 4px 3px 0;
  font-family:var(--font-ui);font-size:12px;font-weight:600;
  color:var(--sc-text);
  animation:blockDrop .3s ease both;
}

/* ─── COVER PAGE ─── */
.cover-inner{
  background:linear-gradient(145deg,#4C97FF 0%,#9966FF 100%);
  min-height:380px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:36px 24px 28px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.cover-inner::before{
  content:'';
  position:absolute;inset:0;
  background-image:
    radial-gradient(circle at 30% 30%,rgba(255,255,255,.15) 0%,transparent 40%),
    radial-gradient(circle at 70% 70%,rgba(255,255,255,.1) 0%,transparent 40%);
}
.cover-title{
  font-family:var(--font-ui);font-size:30px;font-weight:700;
  color:#fff;line-height:1.2;
  margin-bottom:6px;position:relative;
}
.cover-title span{
  display:block;font-size:18px;font-weight:500;
  color:rgba(255,255,255,.85);margin-bottom:4px;
}
.cover-sub{
  font-family:var(--font-body);font-size:15px;
  color:rgba(255,255,255,.85);margin:8px 0 4px;
  position:relative;
}
.cover-name{
  font-family:var(--font-ui);font-size:20px;font-weight:700;
  color:#FFD700;margin:6px 0;position:relative;
}
.cover-badge{
  display:inline-block;
  background:rgba(255,255,255,.2);
  border:2px solid rgba(255,255,255,.35);
  color:#fff;
  font-family:var(--font-ui);font-size:12px;font-weight:600;
  padding:4px 16px;border-radius:20px;
  position:relative;margin-top:8px;
}

/* ─── NAV BUTTONS ─── */
.nav-bar{
  display:flex;gap:10px;margin-top:20px;
  align-items:center;justify-content:space-between;
}
.nav-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--font-ui);font-weight:700;font-size:14px;
  padding:11px 22px;border-radius:10px;
  cursor:pointer;border:none;
  transition:all .12s;flex:1;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
/* Back = Red Stop button */
.nav-btn.back-nav{
  background:var(--sc-stop);
  border-bottom:4px solid var(--sc-stop-d);
  color:#fff;
  box-shadow:0 3px 0 rgba(0,0,0,.15);
}
.nav-btn.back-nav:hover:not(:disabled){
  background:#FF4D6A;transform:translateY(-2px);
  box-shadow:0 5px 0 rgba(0,0,0,.18);
}
.nav-btn.back-nav:active:not(:disabled){
  transform:translateY(2px);
  border-bottom-width:2px;
  box-shadow:0 1px 0 rgba(0,0,0,.1);
}
/* Next = Green Flag button */
.nav-btn.next-nav{
  background:var(--sc-ops);
  border-bottom:4px solid var(--sc-ops-d);
  color:#fff;flex:1.5;
  box-shadow:0 3px 0 rgba(0,0,0,.15);
}
.nav-btn.next-nav:hover:not(:disabled){
  background:#4AB04A;transform:translateY(-2px);
  box-shadow:0 5px 0 rgba(0,0,0,.18);
}
.nav-btn.next-nav:active:not(:disabled){
  transform:translateY(2px);
  border-bottom-width:2px;
  box-shadow:0 1px 0 rgba(0,0,0,.1);
}
.nav-btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.nav-btn svg{width:18px;height:18px;flex-shrink:0}

/* ─── SCRATCH CAT ─── */
.scratch-cat{
  position:fixed;bottom:16px;right:16px;
  width:60px;height:60px;
  cursor:pointer;z-index:50;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.2));
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);
}
.scratch-cat:hover{transform:scale(1.15) rotate(-5deg)}
.cat-bubble{
  position:fixed;bottom:82px;right:16px;
  background:#fff;
  border:2px solid var(--sc-border);
  border-radius:12px 12px 0 12px;
  padding:8px 12px;
  font-family:var(--font-body);font-size:12px;font-weight:700;
  color:var(--sc-text);
  box-shadow:0 4px 12px rgba(0,0,0,.12);
  max-width:160px;
  text-align:center;
  z-index:50;
  opacity:0;
  transform:scale(.8);
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
}
.cat-bubble.show{opacity:1;transform:scale(1)}

/* ─── END PAGE ─── */
.end-gradient{
  background:linear-gradient(135deg,var(--sc-motion),var(--sc-looks));
  border-radius:10px;padding:20px;text-align:center;
  margin:14px 0;
}
.end-gradient h2{
  font-family:var(--font-ui);font-size:20px;font-weight:700;
  color:#fff;margin-bottom:8px;
}
.end-gradient p{
  font-size:13px;color:rgba(255,255,255,.9);font-weight:700;line-height:1.65;
}
.next-teaser{
  background:linear-gradient(135deg,#FFF8E6,#FEF3C7);
  border:2px solid var(--sc-events);
  border-left:5px solid var(--sc-events);
  border-radius:0 10px 10px 0;
  padding:14px 16px;margin-top:12px;
}
.next-label{
  font-family:var(--font-ui);font-size:11px;font-weight:600;
  color:#8B4000;text-transform:uppercase;letter-spacing:1px;
  margin-bottom:4px;
}
.next-title{
  font-family:var(--font-ui);font-weight:700;font-size:14px;
  color:#8B4000;
}
.ask-dad-box{
  background:linear-gradient(135deg,#FFF0F5,#FFE4EE);
  border:2px solid var(--sc-stop);
  border-radius:12px;
  padding:16px 18px;
  margin-top:14px;
  text-align:center;
}
.ask-dad-box h3{
  font-family:var(--font-ui);font-size:17px;font-weight:700;
  color:#C0002A;margin-bottom:6px;
}
.ask-dad-box p{
  font-family:var(--font-body);font-size:13px;
  color:#8B002A;font-weight:700;line-height:1.6;
}

/* RESPONSIVE HELPERS */
@media(max-width:420px){
  .cover-title{font-size:24px}
  .page-title{font-size:18px}
  .nav-btn{font-size:12px;padding:10px 14px}
}
</style>
</head>
<body>

<div class="wrapper">

  <!-- TOP BAR -->
  <div class="topbar">

</div><!-- /wrapper -->

<!-- SCRATCH CAT -->
<div class="scratch-cat" id="scratchCat" onclick="toggleBubble()">

</div>

<script>
/* ════════════════════════════════════
   PAGE DATA
════════════════════════════════════ */
const CAT_MOODS=[

  /* 5  contoh   */ {mouth:'M26,31 Q30,36 34,31',bubble:'Aku yang jadi karakternya! 🐱'},
  /* 6  buat     */ {mouth:'M26,31 Q30,37 34,31',bubble:'Aku bisa lompat-lompat! 🐾'},

function mkBlock(cls,icon,text){
  return `<div class="sc-block ${cls}">${icon?`<span>${icon}</span>`:''}${text}</div>`;
}
function mkSeq(items){
  return items.map((x,i)=>`<div style="display:flex;align-items:flex-start;gap:10px;margin:7px 0;opacity:0;animation:blockDrop .3s ${.08+i*.12}s ease both">
    <div style="width:24px;height:24px;border-radius:5px;background:var(--sc-motion);color:#fff;font-family:var(--font-ui);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-bottom:2.5px solid var(--sc-motion-d)">${i+1}</div>
    <div style="font-family:var(--font-body);font-size:13.5px;font-weight:700;color:var(--sc-text);padding-top:2px">${x}</div>
  </div>`).join('');
}
function mkPill(icon,text){
  return `<span class="feature-pill">${icon} ${text}</span>`;
}

  c.innerHTML='';
  for(let i=1;i<=TOTAL;i++){
    const d=document.createElement('span');
    d.className='dot'+(i===cur?' active':i<cur?' done':'');
    d.onclick=()=>goTo(i);
    c.appendChild(d);
  }
}

function render(){
  const p=PAGES[cur-1];
  const card=document.getElementById('pageCard');

  /* rebuild card with snap animation */
  card.style.animation='none';
  card.offsetHeight; // reflow
  card.style.animation='snapIn .35s cubic-bezier(.34,1.56,.64,1) both';

  /* strip */
  let inner=`<div class="color-strip" style="${p.strip}"></div>`;

  if(p.illus){
    inner+=`<div class="page-body-wrap">
      <div class="illus-col">${p.illus}</div>
      <div class="text-col">${p.html}</div>
    </div>`;
  } else {
    inner+=p.html;
  }
  card.innerHTML=inner;

  /* progress */
  document.getElementById('progressFill').style.width=(cur/TOTAL*100)+'%';
  document.getElementById('progressLabel').textContent=`Halaman ${cur} dari ${TOTAL}`;

  /* buttons */
  document.getElementById('prevBtn').disabled=cur===1;
  const nb=document.getElementById('nextBtn');
  nb.disabled=cur===TOTAL;
  nb.innerHTML=cur===TOTAL
    ? `<svg viewBox="0 0 24 24" fill="#fff"><path d="M20 6L9 17l-5-5"/></svg> Selesai!`
    : `Selanjutnya <svg viewBox="0 0 24 24" fill="#fff"><polygon points="5,3 19,12 5,21"/></svg>`;

  buildDots();
  updateCat();
  window.scrollTo({top:0,behavior:'smooth'});
}

function go(d){
  const n=cur+d;
  if(n>=1&&n<=TOTAL){cur=n;render();playPop();}
}
function goTo(n){if(n!==cur){cur=n;render();playPop();}}

/* ─── CAT ─── */
let bubbleTimer;
function updateCat(){
  const m=CAT_MOODS[cur-1];
  document.getElementById('catMouth').setAttribute('d',m.mouth);
  document.getElementById('catBubble').textContent=m.bubble;
  showBubble();
}
function showBubble(){
  clearTimeout(bubbleTimer);
  document.getElementById('catBubble').classList.add('show');
  bubbleTimer=setTimeout(()=>document.getElementById('catBubble').classList.remove('show'),3000);
}
function toggleBubble(){
  const b=document.getElementById('catBubble');
  if(b.classList.contains('show')){b.classList.remove('show');clearTimeout(bubbleTimer);}
  else showBubble();
}

/* ─── POP SOUND (Web Audio) ─── */
function playPop(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';
    o.frequency.setValueAtTime(600,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(300,ctx.currentTime+.1);
    g.gain.setValueAtTime(.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.15);
    o.start();o.stop(ctx.currentTime+.15);
  }catch(e){}
}

render();
</script>
