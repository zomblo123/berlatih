<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Rumah yang Bisa Bantu Bunda — Flipbook Seri 15</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0EA5E9;
  --blue-dark:#0369A1;
  --blue-deep:#0C1A2E;
  --blue-mid:#38BDF8;
  --blue-pale:#E0F2FE;
  --blue-glow:rgba(14,165,233,0.18);
  --orange:#F97316;
  --orange-dark:#C2410C;
  --orange-pale:#FFF7ED;
  --orange-glow:rgba(249,115,22,0.2);
  --white:#FFFFFF;
  --off-white:#F8FAFD;
  --panel:#FFFFFF;
  --text:#0C1A2E;
  --text-muted:#4B6080;
  --border:#C8E4F8;
  --grid:rgba(14,165,233,0.07);
  --orb:'Orbitron',sans-serif;
  --body:'Quicksand',sans-serif;
  --glow-shadow:0 0 20px rgba(14,165,233,0.15), 0 0 60px rgba(14,165,233,0.06);
  --card-shadow:0 4px 24px rgba(14,165,233,0.12), 0 1px 4px rgba(0,0,0,0.06);
}

body{
  font-family:var(--body);
  background:var(--off-white);
  min-height:100vh;
  padding:16px;
  color:var(--text);
  overflow-x:hidden;
}

/* ── TECH GRID BG ── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px),
    radial-gradient(ellipse at 20% 30%, rgba(14,165,233,0.05) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 70%, rgba(249,115,22,0.04) 0%, transparent 50%);
  background-size:32px 32px, 32px 32px, 100% 100%, 100% 100%;
  pointer-events:none;
  z-index:0;
}

/* ── SCANNING LINE ── */
.scan-wrap{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  overflow:hidden;
}
.scan-line{
  position:absolute;
  left:0;right:0;
  height:2px;
  background:linear-gradient(90deg, transparent, rgba(14,165,233,0.4), rgba(56,189,248,0.6), rgba(14,165,233,0.4), transparent);
  animation:scan 4s linear infinite;
  opacity:0;
}
@keyframes scan{
  0%{top:-2px;opacity:0}
  5%{opacity:1}
  95%{opacity:0.6}
  100%{top:100%;opacity:0}
}

/* ── RADAR CORNER ── */
.radar-corner{
  position:fixed;
  bottom:20px;
  left:20px;
  width:52px;height:52px;
  z-index:5;
  opacity:0.45;
}
.radar-corner svg{animation:radarSpin 3s linear infinite}
@keyframes radarSpin{to{transform:rotate(360deg)}}

.wrapper{
  position:relative;
  z-index:2;
  max-width:800px;
  margin:0 auto;
}

/* ── TOP BAR ── */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
  gap:10px;
  flex-wrap:wrap;
}
.back-btn{
  display:flex;
  align-items:center;
  gap:7px;
  background:var(--panel);
  border:1.5px solid var(--border);
  color:var(--text-muted);
  font-family:var(--body);
  font-weight:700;
  font-size:13px;
  padding:7px 16px;
  border-radius:8px;
  cursor:pointer;
  text-decoration:none;
  transition:all .18s;
  box-shadow:var(--card-shadow);
}
.back-btn:hover{
  border-color:var(--blue);
  color:var(--blue-dark);
  box-shadow:0 0 12px var(--blue-glow), var(--card-shadow);
  transform:translateY(-1px);
}
.brand-chip{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--blue-deep);
  color:var(--blue-mid);
  font-family:var(--orb);
  font-weight:700;
  font-size:11px;
  padding:7px 14px;
  border-radius:8px;
  letter-spacing:1px;
  box-shadow:0 0 16px rgba(14,165,233,0.25);
  border:1px solid rgba(56,189,248,0.3);
}
.brand-chip .dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--blue-mid);
  animation:blink 1.4s ease infinite;
}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 6px var(--blue-mid)}50%{opacity:0.4;box-shadow:none}}
.series-chip{
  font-family:var(--orb);
  font-size:10px;
  font-weight:700;
  color:var(--orange-dark);
  background:var(--orange-pale);
  border:1.5px solid rgba(249,115,22,0.3);
  padding:6px 12px;
  border-radius:8px;
  letter-spacing:1.5px;
  box-shadow:0 0 10px var(--orange-glow);
}

/* ── PROGRESS BAR ── */
.progress-area{
  margin-bottom:14px;
  background:var(--panel);
  border-radius:10px;
  border:1.5px solid var(--border);
  padding:10px 16px;
  box-shadow:var(--card-shadow);
  display:flex;
  align-items:center;
  gap:14px;
}
.progress-track{
  flex:1;
  height:6px;
  background:var(--blue-pale);
  border-radius:3px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  border-radius:3px;
  background:linear-gradient(90deg, var(--blue), var(--blue-mid), var(--orange));
  transition:width .5s cubic-bezier(.22,1,.36,1);
  position:relative;
}
.progress-fill::after{
  content:'';
  position:absolute;
  right:0;top:0;bottom:0;
  width:20px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5));
  animation:shimmer 1.5s ease infinite;
}
@keyframes shimmer{0%,100%{opacity:1}50%{opacity:0.3}}
.progress-info{
  font-family:var(--orb);
  font-size:11px;
  font-weight:700;
  color:var(--blue-dark);
  white-space:nowrap;
  letter-spacing:1px;
}

/* ── ROADMAP ── */
.roadmap-wrap{
  overflow-x:auto;
  margin-bottom:16px;
  padding-bottom:4px;
}
.roadmap{
  display:flex;
  align-items:center;
  min-width:max-content;
  gap:0;
  padding:2px 2px;
}
.rm-node{
  width:30px;height:30px;
  border-radius:6px;
  background:var(--panel);
  border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--orb);font-size:9px;font-weight:700;
  color:var(--text-muted);cursor:pointer;
  transition:all .15s;flex-shrink:0;
  box-shadow:var(--card-shadow);
}
.rm-node:hover{background:var(--blue-pale);border-color:var(--blue);color:var(--blue-dark);box-shadow:0 0 10px var(--blue-glow)}
.rm-node.active{
  background:var(--blue-deep);border-color:var(--blue);color:var(--blue-mid);
  box-shadow:0 0 14px var(--blue-glow);
}
.rm-node.done{background:var(--blue-pale);border-color:var(--blue);color:var(--blue-dark)}
.rm-conn{width:16px;height:2px;background:var(--border);flex-shrink:0}
.rm-conn.done{background:var(--blue);box-shadow:0 0 4px var(--blue-glow)}

/* ── PAGE CARD ── */
.page-card{
  background:var(--panel);
  border-radius:16px;
  border:1.5px solid var(--border);
  overflow:hidden;
  min-height:460px;
  box-shadow:var(--card-shadow), 0 0 40px rgba(14,165,233,0.08);
  animation:pageIn .4s cubic-bezier(.22,1,.36,1) both;
}
@keyframes pageIn{
  from{opacity:0;transform:translateY(12px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* ── HEADER STRIP ── */
.page-strip{height:6px}

/* ── LAYOUT ── */
.page-layout{
  display:grid;
  grid-template-columns:1fr;
}
@media(min-width:580px){
  .page-layout{grid-template-columns:1fr 1fr}
  .illus-col{border-right:1.5px solid var(--border)}
}
.illus-col{
  padding:28px 22px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--blue-pale) 0%,#F0F8FF 60%,#fff 100%);
  min-height:220px;
  position:relative;
  overflow:hidden;
}
.illus-col::before{
  content:'';
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(14,165,233,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(14,165,233,0.05) 1px,transparent 1px);
  background-size:20px 20px;
  pointer-events:none;
}
.text-col{
  padding:28px 26px 24px;
  position:relative;
}

/* ── COVER ── */
.cover-col{
  background:var(--blue-deep);
  padding:40px 28px 36px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
  grid-column:1/-1;
}
.cover-col::before{
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 30% 40%, rgba(14,165,233,0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 70%, rgba(249,115,22,0.2) 0%, transparent 50%);
  pointer-events:none;
}
/* Scanning lines in cover */
.cover-col::after{
  content:'';
  position:absolute;inset:0;
  background-image:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(14,165,233,0.03) 3px,
    rgba(14,165,233,0.03) 4px
  );
  pointer-events:none;
}
.cover-title{
  font-family:var(--orb);
  font-size:26px;font-weight:800;
  color:var(--white);
  line-height:1.2;margin-bottom:8px;
  position:relative;z-index:1;
  text-shadow:0 0 30px rgba(56,189,248,0.5);
}
.cover-sub{
  font-family:var(--body);
  font-size:14px;color:rgba(255,255,255,.75);
  margin-bottom:10px;position:relative;z-index:1;
  font-weight:600;
}
.cover-name{
  font-family:var(--orb);font-size:16px;font-weight:700;
  color:var(--orange);margin-bottom:8px;
  position:relative;z-index:1;
  text-shadow:0 0 20px var(--orange-glow);
}
.cover-badge{
  display:inline-block;
  background:rgba(14,165,233,0.15);
  border:1px solid rgba(56,189,248,0.4);
  color:var(--blue-mid);
  font-family:var(--orb);font-size:10px;
  padding:5px 16px;border-radius:20px;
  letter-spacing:2px;
  position:relative;z-index:1;
}

/* ── PAGE META ── */
.page-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--blue-pale);
  border:1px solid var(--border);
  color:var(--blue-dark);
  font-family:var(--orb);font-size:10px;font-weight:700;
  padding:4px 12px;border-radius:20px;
  margin-bottom:12px;
  letter-spacing:1px;
  box-shadow:0 0 8px var(--blue-glow);
}
.page-title{
  font-family:var(--orb);
  font-size:19px;font-weight:700;
  color:var(--text);line-height:1.3;
  margin-bottom:12px;
}
.page-title .hi{color:var(--blue-dark)}
.page-title .lo{color:var(--orange)}
.page-body{
  font-family:var(--body);
  font-size:14px;line-height:1.8;
  color:var(--text-muted);
  font-weight:500;
}
.page-body strong{color:var(--text);font-weight:700}
.page-body em{color:var(--blue-dark);font-style:normal;font-weight:700}

/* ── INFO PANELS ── */
.tech-panel{
  background:var(--blue-deep);
  border-radius:10px;
  border:1px solid rgba(56,189,248,0.25);
  padding:14px 16px;
  margin-top:14px;
  font-family:'Courier New',monospace;
  font-size:12px;
  line-height:1.9;
  box-shadow:0 0 20px rgba(14,165,233,0.1);
  position:relative;
  overflow:hidden;
}
.tech-panel::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:3px;
  background:linear-gradient(180deg,var(--blue-mid),var(--orange));
}
.code-l{
  display:flex;align-items:center;gap:8px;
  opacity:0;transform:translateY(-8px);
  animation:lineIn .28s ease forwards;
}
.code-l .kw{color:#60A5FA}
.code-l .fn{color:#34D399}
.code-l .str{color:#FCD34D}
.code-l .cm{color:#4B5563;font-style:italic}
.code-l .op{color:#F472B6}
@keyframes lineIn{to{opacity:1;transform:translateY(0)}}

.info-box{
  border-radius:0 10px 10px 0;
  padding:12px 14px;
  margin-top:12px;
  font-size:13.5px;font-weight:600;
  line-height:1.65;
  font-family:var(--body);
}
.info-box.blue{
  background:var(--blue-pale);
  border-left:4px solid var(--blue);
  color:var(--blue-dark);
  box-shadow:0 0 12px var(--blue-glow);
}
.info-box.orange{
  background:var(--orange-pale);
  border-left:4px solid var(--orange);
  color:var(--orange-dark);
  box-shadow:0 0 10px var(--orange-glow);
}
.info-box.dark{
  background:var(--blue-deep);
  border-left:4px solid var(--blue-mid);
  color:var(--blue-mid);
  font-family:'Courier New',monospace;
  font-size:12.5px;
}

/* ── STEP LIST ── */
.step-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 14px;
  background:var(--off-white);
  border-radius:10px;
  border:1.5px solid var(--border);
  margin:6px 0;
  opacity:0;transform:translateX(-12px);
  animation:slideIn .32s ease forwards;
  box-shadow:0 2px 8px rgba(14,165,233,0.06);
  transition:box-shadow .18s;
}
.step-item:hover{box-shadow:0 0 12px var(--blue-glow)}
@keyframes slideIn{to{opacity:1;transform:translateX(0)}}
.step-num{
  width:28px;height:28px;border-radius:7px;
  background:var(--blue-deep);
  color:var(--blue-mid);
  font-family:var(--orb);font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  border:1px solid rgba(56,189,248,0.3);
  box-shadow:0 0 8px rgba(14,165,233,0.2);
}
.step-text{font-family:var(--body);font-size:13.5px;font-weight:600;color:var(--text);line-height:1.5;padding-top:3px}

/* ── SWITCH TOGGLE NAV ── */
.nav-bar{
  display:flex;align-items:center;gap:10px;
  margin-top:16px;
}
.nav-btn{
  display:flex;align-items:center;gap:8px;
  background:var(--panel);
  border:1.5px solid var(--border);
  color:var(--text-muted);
  font-family:var(--body);font-weight:700;font-size:14px;
  padding:12px 22px;border-radius:10px;
  cursor:pointer;transition:all .18s;flex:1;justify-content:center;
  box-shadow:var(--card-shadow);
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.nav-btn::before{
  content:'';position:absolute;
  inset:0;background:linear-gradient(135deg,rgba(14,165,233,0.06),transparent);
  opacity:0;transition:opacity .18s;
}
.nav-btn:hover:not(:disabled)::before{opacity:1}
.nav-btn:hover:not(:disabled){
  border-color:var(--blue);color:var(--blue-dark);
  box-shadow:0 0 16px var(--blue-glow), var(--card-shadow);
  transform:translateY(-2px);
}
.nav-btn:active:not(:disabled){transform:translateY(0);box-shadow:var(--card-shadow)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-btn.primary{
  background:var(--blue-deep);
  border-color:rgba(56,189,248,0.4);
  color:var(--blue-mid);flex:1.6;
  box-shadow:0 0 20px rgba(14,165,233,0.2), var(--card-shadow);
}
.nav-btn.primary:hover:not(:disabled){
  background:#0D2340;
  color:var(--blue-mid);
  box-shadow:0 0 30px rgba(14,165,233,0.3), var(--card-shadow);
}
.nav-btn.restart{
  background:var(--orange-pale);
  border-color:rgba(249,115,22,0.3);
  color:var(--orange-dark);
  font-family:var(--body);font-weight:700;
  box-shadow:0 0 12px var(--orange-glow), var(--card-shadow);
  width:100%;margin-top:8px;flex:none;
}
.nav-btn.restart:hover{
  border-color:var(--orange);
  box-shadow:0 0 20px var(--orange-glow), var(--card-shadow);
}

/* ── TOGGLE SWITCH VISUAL ── */
.toggle-row{
  display:flex;align-items:center;gap:10px;
  margin-top:12px;
}
.toggle{
  width:44px;height:24px;
  background:var(--blue-pale);
  border-radius:12px;
  border:1.5px solid var(--border);
  position:relative;
  cursor:pointer;
  transition:all .2s;
}
.toggle.on{background:var(--blue);border-color:var(--blue-dark);box-shadow:0 0 10px var(--blue-glow)}
.toggle::after{
  content:'';
  position:absolute;
  top:3px;left:3px;
  width:16px;height:16px;border-radius:50%;
  background:white;
  transition:transform .2s;
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.toggle.on::after{transform:translateX(20px)}
.toggle-label{font-family:var(--orb);font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px}

/* ── END CARD ── */
.end-wrap{
  background:var(--blue-deep);
  border-radius:12px;
  padding:22px;
  text-align:center;
  border:1px solid rgba(56,189,248,0.25);
  box-shadow:0 0 40px rgba(14,165,233,0.15);
  position:relative;overflow:hidden;
}
.end-wrap::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%, rgba(14,165,233,0.2) 0%,transparent 60%);
  pointer-events:none;
}
.end-title{
  font-family:var(--orb);font-size:20px;font-weight:800;
  color:var(--white);margin-bottom:8px;
  text-shadow:0 0 20px rgba(56,189,248,0.6);
  position:relative;
}
.end-text{
  font-family:var(--body);font-size:13.5px;font-weight:600;
  color:rgba(255,255,255,.85);line-height:1.75;
  position:relative;
}
.next-panel{
  background:var(--blue-pale);
  border:1.5px solid var(--border);
  border-left:4px solid var(--orange);
  border-radius:0 10px 10px 0;
  padding:14px 16px;margin-top:12px;
  box-shadow:0 0 10px var(--orange-glow);
}
.next-label{
  font-family:var(--orb);font-size:10px;font-weight:700;
  color:var(--orange-dark);letter-spacing:1.5px;margin-bottom:4px;
}
.next-title{font-family:var(--body);font-weight:700;font-size:14px;color:var(--text)}

/* ── AYAH SIGIT PANEL ── */
.ayah-panel{
  background:linear-gradient(135deg,#FFF7ED,#FFF);
  border:1.5px solid rgba(249,115,22,0.25);
  border-radius:10px;
  padding:12px 16px;
  margin-top:12px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 0 12px var(--orange-glow);
}
.ayah-avatar{
  width:42px;height:42px;border-radius:50%;
  background:var(--orange);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
  border:2px solid var(--orange-dark);
  box-shadow:0 0 10px var(--orange-glow);
}
.ayah-text{font-family:var(--body);font-size:12.5px;font-weight:600;color:var(--orange-dark);line-height:1.55}
.ayah-text strong{font-weight:700;color:var(--text)}

/* ── SVG ILLUS ── */
.illus-svg{width:100%;max-width:250px;height:auto;position:relative;z-index:1}

/* ── ROBOT STATUS BAR ── */
.status-bar{
  display:flex;align-items:center;gap:10px;
  padding:6px 12px;
  background:var(--blue-deep);
  font-family:var(--orb);font-size:9px;font-weight:700;
  color:var(--blue-mid);
  letter-spacing:1px;
}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--blue-mid);animation:blink 1.4s ease infinite}
.status-dot.orange{background:var(--orange);box-shadow:0 0 6px var(--orange-glow)}

/* ── STAGGER ── */
.step-item:nth-child(1),.code-l:nth-child(1){animation-delay:.04s}
.step-item:nth-child(2),.code-l:nth-child(2){animation-delay:.15s}
.step-item:nth-child(3),.code-l:nth-child(3){animation-delay:.26s}
.step-item:nth-child(4),.code-l:nth-child(4){animation-delay:.37s}
.step-item:nth-child(5),.code-l:nth-child(5){animation-delay:.48s}
.step-item:nth-child(6){animation-delay:.59s}

@media(max-width:420px){
  .cover-title{font-size:20px}
  .page-title{font-size:16px}
  .nav-btn{font-size:13px;padding:10px 14px}
  .brand-chip{font-size:10px}
}
</style>
</head>
<body>

<!-- Scanning line overlay -->
<div class="scan-wrap"><div class="scan-line"></div></div>

<!-- Radar corner decoration -->

function buildRoadmap(){
  const rm = document.getElementById('roadmap');
  rm.innerHTML = '';
  for(let i=1;i<=TOTAL;i++){
    const n = document.createElement('div');
    n.className = 'rm-node' + (i===cur?' active':i<cur?' done':'');
    n.textContent = String(i).padStart(2,'0');
    n.onclick = ()=>goTo(i);
    rm.appendChild(n);
    if(i<TOTAL){
      const c = document.createElement('div');
      c.className = 'rm-conn' + (i<cur?' done':'');
      rm.appendChild(c);
    }
  }
  const active = rm.querySelector('.active');
  if(active) active.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
}

  const p = pages[cur-1];

  if(p.cover){
    card.innerHTML = statusBar + `
      <div class="page-strip" style="${p.strip}"></div>

        <div class="cover-title" style="margin-top:16px">Robot Rumah<br>yang Bisa<br>Bantu Bunda</div>

          </div>

        </div>

  } else {
    card.innerHTML = statusBar + `

  // Re-trigger animation
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';

  // Progress
  const pct = (cur / TOTAL * 100).toFixed(1);
  document.getElementById('pgFill').style.width = pct + '%';
  document.getElementById('pgLabel').textContent = String(cur).padStart(2,'0') + ' / ' + String(TOTAL).padStart(2,'0');

  // Nav
  document.getElementById('prevBtn').disabled = (cur === 1);
  const nb = document.getElementById('nextBtn');
  nb.disabled = (cur === TOTAL);
  nb.textContent = cur === TOTAL ? '✓ SELESAI' : 'NEXT →';

  buildRoadmap();
  window.scrollTo({top:0,behavior:'smooth'});
}

function go(d){
  const n = cur + d;
  if(n >= 1 && n <= TOTAL){ cur = n; render(); }
}
function goTo(n){ cur = n; render(); }
function reset(){ cur = 1; render(); }

render();
